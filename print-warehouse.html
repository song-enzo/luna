<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<title>花版仓库 · <span class="dynamic-brand-name"></span></title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#faf9f7;color:#1a1a1a}
.header{display:flex;align-items:center;padding:0 16px;height:54px;background:#fff;border-bottom:1px solid #e8e5e0;position:sticky;top:0;z-index:100}
.hamburger{font-size:22px;cursor:pointer;padding:4px 10px 4px 0;background:none;border:none;color:#666;font-family:inherit;line-height:1}
.hamburger:hover{color:#1a1a1a}
.header .logo{font-size:16px;font-weight:700;letter-spacing:1px;text-decoration:none;color:#1a1a1a;margin-right:auto}
.page{max-width:960px;margin:0 auto;padding:16px}
h1{font-size:18px;font-weight:700;margin-bottom:4px;color:#1a1a1a}
.subtitle{font-size:11px;color:#999;margin-bottom:16px}
/* Search */
.search-bar{width:100%;padding:8px 12px;border:1px solid #e0dcd5;border-radius:20px;font-size:13px;font-family:inherit;outline:none;margin-bottom:12px}
.search-bar:focus{border-color:#c9a96e}
/* Stats */
.stats{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;font-size:12px;color:#888}
.stats span{padding:6px 14px;background:#fff;border:1px solid #e8e5e0;border-radius:6px}
.stats strong{color:#1a1a1a}
/* Folder group */
.folder{margin-bottom:6px;background:#fff;border:1px solid #e8e5e0;border-radius:8px;overflow:hidden}
.folder-header{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;transition:background .1s;user-select:none}
.folder-header:hover{background:#f7f5f2}
.folder-header .icon{font-size:18px;flex-shrink:0}
.folder-header .code{font-size:14px;font-weight:600;color:#1a1a1a;flex:1}
.folder-header .count{font-size:11px;color:#aaa}
.folder-header .arrow{font-size:12px;color:#ccc;transition:transform .15s;flex-shrink:0}
.folder-header .arrow.open{transform:rotate(90deg)}
.folder-body{display:none;border-top:1px solid #f0ede8;padding:12px}
.folder-body.open{display:block}
/* Print grid inside folder */
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.print-card{background:#faf9f7;border:1px solid #edeae5;border-radius:6px;overflow:hidden;position:relative}
.print-card .thumb{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#f0ede8;cursor:pointer}
.print-card .thumb:hover{opacity:.9}
.print-card .info{padding:6px 8px 8px}
.print-card .info .qty{font-size:11px;color:#c9a96e;font-weight:600}
.print-card .info .del{position:absolute;top:4px;right:4px;width:22px;height:22px;border:none;background:rgba(255,255,255,.85);border-radius:50%;font-size:11px;color:#c44;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1}
.print-card .info .del:hover{background:#fef0f0}
.empty-state{text-align:center;padding:60px 20px;color:#ccc;font-size:13px}
/* Lightbox */
.lightbox-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:99999;align-items:center;justify-content:center;cursor:pointer}
.lightbox-overlay.active{display:flex}
.lightbox-overlay img{max-width:90vw;max-height:85vh;border-radius:4px;object-fit:contain}
.lightbox-overlay .lb-close{position:fixed;top:12px;right:16px;font-size:28px;color:rgba(255,255,255,.5);background:none;border:none;cursor:pointer;font-family:inherit;padding:8px}
.lightbox-overlay .lb-close:hover{color:#fff}
/* Side menu */
.side-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
.side-overlay.active{display:block}
.side-menu{position:fixed;top:0;left:0;bottom:0;width:270px;background:#fff;z-index:201;transform:translateX(-100%);transition:transform .2s ease;box-shadow:2px 0 12px rgba(0,0,0,.1);overflow-y:auto}
.side-menu.open{transform:translateX(0)}
.side-menu .sm-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid #f0ede8}
.side-menu .sm-header .sm-logo{font-size:15px;font-weight:700;letter-spacing:1px;color:#1a1a1a}
.side-menu .sm-header .sm-close{font-size:18px;cursor:pointer;color:#999;background:none;border:none;font-family:inherit}
.side-menu .sm-section{padding:8px 0;border-bottom:1px solid #f5f2ef}
.side-menu .sm-section-title{font-size:9px;font-weight:600;color:#b5a58a;letter-spacing:1px;padding:0 16px 6px;text-transform:uppercase}
.side-menu .sm-link{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:13px;color:#555;text-decoration:none;transition:all .1s}
.side-menu .sm-link:hover{background:#faf9f6;color:#1a1a1a}
.side-menu .sm-link.danger{color:#c44}
.side-menu .sm-link.danger:hover{background:#fef0f0;color:#c33}
@media(max-width:600px){.page{padding:10px}.folder-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="header">
  <button class="hamburger" onclick="toggleMenu()">☰</button>
  <span class="logo">🌸 花版仓库</span>
</div>

<div class="side-overlay" id="sideOverlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
  <div class="sm-header">
    <span class="sm-logo"><span class="dynamic-brand-name"></span></span>
    <button class="sm-close" onclick="toggleMenu()">✕</button>
  </div>
  <div class="sm-section">
    <div class="sm-section-title">款式</div>
    <a class="sm-link" href="guest-styles.html">👗 款式浏览</a>
    <a class="sm-link" href="add-style.html">➕ 添加款式</a>
  </div>
  <div class="sm-section">
    <div class="sm-section-title">订单</div>
    <a class="sm-link" href="my-orders.html">📋 我的订单</a>
    <a class="sm-link" href="orders.html">📋 订单管理</a>
  </div>
  <div class="sm-section">
    <div class="sm-section-title">管理</div>
    <a class="sm-link" href="settings.html">&#x2699; 设置</a>
    <a class="sm-link" href="print-warehouse.html">🌸 花版仓库</a>
    <a class="sm-link" href="dashboard.html">🏠 工作台</a>
    <a class="sm-link danger" href="javascript:void(0)" onclick="logout()">🚪 退出账号</a>
  </div>
</div>

<div class="page">
  <h1>🌸 花版仓库</h1>
  <div class="subtitle">按款式编号分组，展示历史花版与订单数量</div>

  <input class="search-bar" id="searchInput" placeholder="搜索编号..." oninput="renderGroups()">
  <div class="stats" id="statsBar"></div>
  <div id="groupList"></div>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
</div>

<script src="luna-data.js?v=25"></script>
<script>LUNA.renderNav();</script>
<script>
function toggleMenu(){document.getElementById('sideMenu').classList.toggle('open');document.getElementById('sideOverlay').classList.toggle('active')}
function logout(){LUNA.clearUser();window.location.href='index.html'}

// ── State ──
var _groups = [];
var _groupPrints = {}; // print_code -> array of prints

// ── Utilities ──
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function openLightbox(url){document.getElementById('lightboxImg').src=url;document.getElementById('lightboxOverlay').classList.add('active')}
function closeLightbox(){document.getElementById('lightboxOverlay').classList.remove('active')}

// ── Load groups ──
function loadGroups(){
  fetch('/api/print-warehouse/groups').then(function(r){return r.json()}).then(function(list){
    _groups = list || [];
    renderGroups();
  }).catch(function(){});
}

// ── Load prints for a code ──
function loadPrintsForCode(printCode, cb){
  if(_groupPrints[printCode]) { cb(_groupPrints[printCode]); return; }
  fetch('/api/print-warehouse/by-style/'+encodeURIComponent(printCode))
    .then(function(r){return r.json()})
    .then(function(prints){
      _groupPrints[printCode] = prints || [];
      cb(_groupPrints[printCode]);
    }).catch(function(){cb([])});
}

// ── Toggle folder ──
function toggleGroup(printCode, headerEl){
  var body = headerEl.nextElementSibling;
  var arrow = headerEl.querySelector('.arrow');
  if(body.classList.contains('open')){
    body.classList.remove('open');
    if(arrow) arrow.classList.remove('open');
    return;
  }
  // Open this folder
  loadPrintsForCode(printCode, function(prints){
    body.classList.add('open');
    if(arrow) arrow.classList.add('open');
    renderFolderBody(body, prints);
  });
}

// ── Render folder body ──
function renderFolderBody(body, prints){
  if(!prints || !prints.length){
    body.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;font-size:12px">暂无花版记录</div>';
    return;
  }
  var html = '<div class="folder-grid">';
  prints.forEach(function(p){
    var img = p.thumb_img || p.big_img || '';
    var qtyText = (p.total_ordered !== undefined) ? '📦 历史总数: '+p.total_ordered : '';
    html += '<div class="print-card">'+
      (img ? '<img class="thumb" src="'+esc(img)+'" onclick="openLightbox(\''+esc(img)+'\')" loading="lazy">' : '<div class="thumb" style="display:flex;align-items:center;justify-content:center;color:#ddd;font-size:24px">🖼</div>')+
      '<div class="info">'+
      (qtyText ? '<div class="qty">'+qtyText+'</div>' : '')+
      '<button class="del" onclick="deletePrint('+p.id+',\''+esc(p.print_code)+'\')">✕</button>'+
      '</div></div>';
  });
  html += '</div>';
  body.innerHTML = html;
}

// ── Delete print ──
function deletePrint(pid, printCode){
  if(!confirm('确认永久删除此花版？')) return;
  fetch('/api/print-warehouse/'+pid,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){
    if(res.error){LUNA.showAlert('删除失败: '+res.error);return}
    // Clear cached prints for this code
    delete _groupPrints[printCode];
    // Re-expand if still open
    var folder = document.querySelector('.folder-header .code');
    // Simple fallback: reload everything
    loadGroups();
  }).catch(function(){LUNA.showAlert('网络错误')});
}

// ── Render groups ──
function renderGroups(){
  var q = (document.getElementById('searchInput').value||'').toLowerCase();
  var filtered = _groups.filter(function(g){
    if(!q) return true;
    return (g.print_code||'').toLowerCase().indexOf(q) >= 0;
  });

  var totalPrints = _groups.reduce(function(s,g){return s + (g.print_count||0)}, 0);
  document.getElementById('statsBar').innerHTML =
    '<span>📁 款式 <strong>'+_groups.length+'</strong></span>'+
    '<span>🌸 花版 <strong>'+totalPrints+'</strong></span>'+
    '<span>🔍 筛选 <strong>'+filtered.length+'</strong></span>';

  var list = document.getElementById('groupList');
  if(!filtered.length){
    list.innerHTML = '<div class="empty-state">暂无花版数据<br><span style="font-size:11px;color:#ddd">在款式下单页上传花版后，将在此按编号分组展示</span></div>';
    return;
  }

  var html = '';
  filtered.forEach(function(g){
    var thumb = g.thumb || '';
    html += '<div class="folder">'+
      '<div class="folder-header" onclick="toggleGroup(\''+esc(g.print_code)+'\',this)">'+
        '<span class="icon">📁</span>'+
        '<span class="code">'+(g.print_code||'')+'</span>'+
        '<span class="count">'+(g.print_count||0)+'张花版</span>'+
        '<span class="arrow">▶</span>'+
      '</div>'+
      '<div class="folder-body"></div>'+
    '</div>';
  });
  list.innerHTML = html;
}

// ── Init ──
loadGroups();
</script>
</body>
</html>
