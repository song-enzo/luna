<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>花版仓库 · LUNA ATELIER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#faf9f7;color:#1a1a1a}
.header{height:54px;background:#fff;border-bottom:1px solid #e8e5e0;display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:50}
.back{font-size:20px;color:#666;text-decoration:none}
.logo{font-size:16px;font-weight:700;letter-spacing:1px}
.page{max-width:1100px;margin:0 auto;padding:16px}
h1{font-size:18px;margin-bottom:4px}
.subtitle{font-size:12px;color:#999;margin-bottom:14px}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.search{flex:1;min-width:180px;padding:9px 12px;border:1px solid #e0dcd5;border-radius:20px;font-size:13px;outline:none}
.search:focus{border-color:#c9a96e}
.toggle{font-size:12px;color:#666;display:flex;align-items:center;gap:5px;cursor:pointer}
.stats{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;font-size:12px;color:#777}
.stats span{background:#fff;border:1px solid #e8e5e0;border-radius:6px;padding:6px 12px}
.stats strong{color:#1a1a1a}
.folder{background:#fff;border:1px solid #e8e5e0;border-radius:8px;margin-bottom:10px;overflow:hidden}
.folder-head{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;background:#fff}
.folder-head:hover{background:#f7f5f2}
.folder-code{font-weight:700;color:#1a1a1a;flex:1}
.folder-name{font-size:12px;color:#888;font-weight:400;margin-left:6px}
.folder-meta{font-size:11px;color:#999}
.folder-body{display:none;border-top:1px solid #f0ede8;padding:14px}
.folder.open .folder-body{display:block}
.master{border:1px solid #eee8df;border-radius:8px;margin-bottom:12px;overflow:hidden;background:#fdfcfb}
.master-head{display:grid;grid-template-columns:120px 1fr;gap:12px;padding:10px;border-bottom:1px solid #f1ede7;align-items:center}
.master-img{width:120px;aspect-ratio:3/4;object-fit:contain;background:#f4f1ec;border-radius:5px;cursor:pointer}
.master-title{font-weight:700;color:#c9a96e;margin-bottom:4px}
.master-sub{font-size:12px;color:#777;line-height:1.6}
.swatches{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;padding:10px}
.swatch{border:1px solid #eee8df;border-radius:6px;background:#fff;overflow:hidden;position:relative}
.swatch img{width:100%;aspect-ratio:3/4;object-fit:contain;background:#f7f6f3;display:block;cursor:pointer}
.swatch-info{padding:6px;font-size:11px;line-height:1.35}
.swatch-name{font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.swatch-code{color:#c9a96e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.swatch-qty{margin-top:4px;color:#777}
.swatch-qty.zero{color:#c44}
.del{position:absolute;top:4px;right:4px;width:22px;height:22px;border:none;border-radius:50%;background:rgba(255,255,255,.9);color:#c44;cursor:pointer}
.empty{text-align:center;color:#bbb;font-size:13px;padding:60px 20px}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;align-items:center;justify-content:center;flex-direction:column;padding:16px}
.lightbox.show{display:flex}
.lightbox img{max-width:96vw;max-height:88vh;object-fit:contain}
.lightbox button{position:fixed;top:14px;right:14px;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:22px}
.lightbox-name{position:fixed;bottom:18px;color:rgba(255,255,255,.75);font-size:13px}
@media(max-width:650px){.master-head{grid-template-columns:88px 1fr}.master-img{width:88px}.swatches{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="header">
  <a class="back" href="javascript:void(0)" onclick="if(history.length>1)history.back();else location.href='dashboard.html'">&larr;</a>
  <div class="logo">花版仓库</div>
</div>
<div class="page">
  <h1>花版仓库</h1>
  <div class="subtitle">按款式编号归档；每个大图下面显示切割色卡和累计下单件数。</div>
  <div class="toolbar">
    <input class="search" id="searchInput" placeholder="搜索款式编号、款式名、花版编号..." oninput="loadTree()">
    <label class="toggle"><input type="checkbox" id="unusedOnly" onchange="loadTree()"> 只看从未下单色卡</label>
  </div>
  <div class="stats" id="statsBar"></div>
  <div id="treeList"></div>
</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="">
  <div class="lightbox-name" id="lightboxName"></div>
</div>
<script src="luna-data.js?v=27"></script>
<script>
var treeData=[];
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function openLightbox(url,name){if(!url)return;document.getElementById('lightboxImg').src=url;document.getElementById('lightboxName').textContent=name||'';document.getElementById('lightbox').classList.add('show')}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show')}
function loadTree(){
  var q=document.getElementById('searchInput').value||'';
  var unused=document.getElementById('unusedOnly').checked?'1':'0';
  fetch('/api/print-warehouse/tree?q='+encodeURIComponent(q)+'&unused='+unused)
    .then(function(r){return r.json()})
    .then(function(data){treeData=data||[];renderTree()})
    .catch(function(){document.getElementById('treeList').innerHTML='<div class="empty">加载失败</div>'});
}
function renderTree(){
  var styleCount=treeData.length,totalMasters=0,totalSwatches=0,totalOrdered=0;
  treeData.forEach(function(folder){
    totalMasters+=folder.masters.length;
    totalSwatches+=folder.print_count||0;
    totalOrdered+=folder.total_ordered||0;
  });
  document.getElementById('statsBar').innerHTML='<span>款式 <strong>'+styleCount+'</strong></span><span>大图 <strong>'+totalMasters+'</strong></span><span>色卡 <strong>'+totalSwatches+'</strong></span><span>累计下单 <strong>'+totalOrdered+'</strong></span>';
  var list=document.getElementById('treeList');
  if(!treeData.length){list.innerHTML='<div class="empty">暂无花版数据</div>';return}
  list.innerHTML=treeData.map(function(folder,idx){
    return '<div class="folder" id="folder_'+idx+'">'+
      '<div class="folder-head" onclick="toggleFolder('+idx+')">'+
        '<div class="folder-code">'+esc(folder.style_code)+'<span class="folder-name">'+esc(folder.style_name||'')+'</span></div>'+
        '<div class="folder-meta">'+(folder.masters.length)+' 张大图 · '+(folder.print_count||0)+' 色卡 · '+(folder.total_ordered||0)+' 件</div>'+
      '</div><div class="folder-body">'+renderMasters(folder)+'</div></div>';
  }).join('');
}
function renderMasters(folder){
  return folder.masters.map(function(master){
    var name=master.print_code||folder.style_code;
    return '<div class="master">'+
      '<div class="master-head">'+
        (master.master_image?'<img class="master-img" src="'+esc(master.master_image)+'" onclick="openLightbox(\''+esc(master.master_image)+'\',\''+esc(name)+'\')">':'<div class="master-img"></div>')+
        '<div><div class="master-title">'+esc(name)+'</div><div class="master-sub">'+(master.colorway_count||0)+' 个色卡<br>累计下单 '+(master.total_ordered||0)+' 件</div></div>'+
      '</div><div class="swatches">'+master.colorways.map(renderSwatch).join('')+'</div></div>';
  }).join('');
}
function renderSwatch(p){
  var label=p.color_name||p.sub_code||p.print_code||('色卡 '+p.id);
  var img=p.big_img||p.thumb_img||'';
  var qty=p.total_ordered||0;
  return '<div class="swatch">'+
    (img?'<img src="'+esc(img)+'" onclick="openLightbox(\''+esc(img)+'\',\''+esc(label)+'\')">':'')+
    '<button class="del" onclick="event.stopPropagation();deletePrint('+p.id+')">×</button>'+
    '<div class="swatch-info"><div class="swatch-name">'+esc(label)+'</div><div class="swatch-code">'+esc(p.sub_code||p.print_code||'')+'</div><div class="swatch-qty '+(qty?'':'zero')+'">下单 '+qty+' 件</div></div>'+
  '</div>';
}
function toggleFolder(idx){document.getElementById('folder_'+idx).classList.toggle('open')}
function deletePrint(id){
  if(!confirm('删除这个花版色卡？'))return;
  fetch('/api/print-warehouse/'+id,{method:'DELETE'}).then(function(r){return r.json()}).then(loadTree);
}
loadTree();
</script>
</body>
</html>
