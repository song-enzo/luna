<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LUNA ATELIER — Cutting History</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.detail-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:5000;overflow-y:auto}
.detail-box{background:#fff;max-width:700px;margin:40px auto;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.detail-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--cream);border-bottom:1px solid var(--border)}
.detail-header h3{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text)}
.detail-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-muted);padding:0 4px}
.detail-close:hover{color:var(--text)}
.detail-body{padding:20px}
.detail-section{margin-bottom:20px}
.detail-section h4{font-size:12px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.detail-row{display:flex;padding:4px 0;font-size:13px}
.detail-label{color:var(--text-muted);min-width:80px;flex-shrink:0}
.detail-value{color:var(--text);font-weight:500}
.detail-table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.detail-table thead th{background:var(--cream);padding:6px 8px;text-align:left;font-weight:600;color:var(--text-muted);font-size:11px;border-bottom:1px solid var(--border)}
.detail-table tbody td{padding:6px 8px;border-bottom:1px solid var(--border)}
.detail-table tbody td:last-child{text-align:right}
.order-card{cursor:pointer}
.order-card:hover{border-color:var(--gold)}
</style>
</head>
<body>
<header class="luna-header"><button class="header-btn" onclick="history.back()">←</button><span class="logo">LUNA <span>A</span></span><span style="font-size:15px;font-weight:500">裁剪历史</span></header>
<main class="container page-enter" style="padding-top:24px;padding-bottom:48px">
  <div class="section-header"><h2 class="section-title">裁剪历史</h2></div>
  <div class="form-group" style="max-width:300px"><input class="form-input" type="text" id="filterSearch" placeholder="搜索订单编号或客人名字..." oninput="render()"></div>
  <div class="order-list" id="historyList"></div>
</main>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-box">
    <div class="detail-header">
      <h3>裁剪详情</h3>
      <button class="detail-close" onclick="document.getElementById('detailOverlay').style.display='none'">&times;</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script src="luna-data.js?v=19"></script>
<script>LUNA.renderNav();</script>
<script>
LUNA.checkAuth();

function render() {
  var orders = LUNA.getOrders().filter(function(o){ return o.cutting_complete; });
  var search = document.getElementById('filterSearch').value.trim().toLowerCase();
  if (search) {
    orders = orders.filter(function(o){
      return o.id.toLowerCase().indexOf(search) >= 0 ||
             (o.customer||'').toLowerCase().indexOf(search) >= 0 ||
             (o.sub_customer||'').toLowerCase().indexOf(search) >= 0;
    });
  }
  orders = orders.slice().reverse();
  if (!orders.length) {
    document.getElementById('historyList').innerHTML = '<div class="empty-state"><div class="icon">📁</div><div class="title">暂无裁剪记录</div></div>';
    return;
  }
  var h = '';
  orders.forEach(function(o) {
    var cutting = o.cutting_complete;
    var code = (o.items && o.items.length) ? o.items[0].code : '';
    h += '<div class="order-card" onclick="showCuttingDetail(\'' + escJs(o.id) + '\')">' +
      '<div class="order-card-header">' +
      '<div><div class="order-id">' + o.id + '</div><div class="order-customer">' +
        (code ? '<span style="color:var(--gold);font-size:12px;font-weight:600;margin-right:8px">ART-' + esc(code) + '</span>' : '') +
        esc(o.customer) + (o.sub_customer ? ' <span style="color:#999;font-size:10px">(二级: ' + esc(o.sub_customer) + ')</span>' : '') +
      '</div></div>' +
      '<span class="badge badge-sewing">已裁剪</span></div>' +
      '<div class="order-meta">' +
      '<span>📦 ' + (cutting.total_cut || cutting.qty || 0) + '件</span>' +
      '<span>🕐 ' + cutting.time + '</span>' +
      '<span>👤 ' + cutting.operator + '</span></div></div>';
  });
  document.getElementById('historyList').innerHTML = h;
}

function showCuttingDetail(orderId) {
  var orders = LUNA.getOrders();
  var order = null;
  for (var i = 0; i < orders.length; i++) {
    if (orders[i].id === orderId) { order = orders[i]; break; }
  }
  if (!order) return;
  var cutting = order.cutting_complete;
  if (!cutting) return;

  var html = '';

  // Order info
  html += '<div class="detail-section"><h4>订单信息</h4>' +
    '<div class="detail-row"><span class="detail-label">订单号</span><span class="detail-value">' + esc(order.id) + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">客户</span><span class="detail-value">' + esc(order.customer) + '</span></div>' +
    (order.sub_customer ? '<div class="detail-row"><span class="detail-label">二级客人</span><span class="detail-value">' + esc(order.sub_customer) + '</span></div>' : '') +
    '<div class="detail-row"><span class="detail-label">日期</span><span class="detail-value">' + (order.date || '') + '</span></div>' +
    (order.note ? '<div class="detail-row"><span class="detail-label">备注</span><span class="detail-value">' + esc(order.note) + '</span></div>' : '') +
    '</div>';

  // Cutting summary
  html += '<div class="detail-section"><h4>裁剪概要</h4>' +
    '<div class="detail-row"><span class="detail-label">裁剪总数</span><span class="detail-value">' + (cutting.total_cut || 0) + ' 件</span></div>' +
    (cutting.time ? '<div class="detail-row"><span class="detail-label">裁剪时间</span><span class="detail-value">' + cutting.time + '</span></div>' : '') +
    (cutting.operator ? '<div class="detail-row"><span class="detail-label">裁剪师</span><span class="detail-value">' + esc(cutting.operator) + '</span></div>' : '') +
    '</div>';

  // Original order items
  var items = order.items || [];
  if (items.length) {
    html += '<div class="detail-section"><h4>下单数量</h4>';
    items.forEach(function(item) {
      html += '<div style="font-size:13px;font-weight:600;color:var(--gold);margin:8px 0 4px">ART-' + esc(item.code || '') + ' ' + esc(item.name || '') + '</div>' +
        '<table class="detail-table"><thead><tr><th>颜色</th><th>面料</th><th>尺码</th><th>数量</th></tr></thead><tbody>';
      var qty = item.qty || {};
      var sizes = Object.keys(qty);
      if (sizes.length) {
        sizes.forEach(function(s) {
          html += '<tr><td>' + esc(item.color || '') + '</td><td>' + esc(item.fabric || '') + '</td><td>' + esc(s) + '</td><td>' + (qty[s] || 0) + '</td></tr>';
        });
      } else {
        html += '<tr><td>' + esc(item.color || '') + '</td><td>' + esc(item.fabric || '') + '</td><td>-</td><td>0</td></tr>';
      }
      html += '</tbody></table>';
    });
    html += '</div>';
  }

  // Cutting details — unified matrix table
  var fabrics = cutting.fabrics || {};
  html += '<div class="detail-section"><h4>实际裁剪数据（矩阵表）</h4>';
  var fNames = Object.keys(fabrics);
  if (fNames.length) {
    html += '<table class="detail-table"><thead><tr><th>面料</th><th>颜色</th><th>层数</th><th>总件数</th><th>唛架长(m)</th><th>损耗(cm)</th><th>预估用料(m)</th></tr></thead><tbody>';
    fNames.forEach(function(fName) {
      var fab = fabrics[fName];
      var cols = fab.colors || {};
      var colNames = Object.keys(cols);
      if (colNames.length) {
        colNames.forEach(function(col, ci) {
          var cd = cols[col];
          html += '<tr>' +
            (ci === 0 ? '<td rowspan="' + colNames.length + '" style="font-weight:600;color:var(--gold)">' + esc(fName) + '</td>' : '') +
            '<td>' + esc(col) + '</td>' +
            '<td>' + (cd.layers || 0) + '</td>' +
            '<td>' + (cd.total || 0) + '</td>' +
            '<td>' + (fab.patternLen ? parseFloat(fab.patternLen).toFixed(2) : '-') + '</td>' +
            '<td>' + (fab.lossCm || '-') + '</td>' +
            '<td>' + (cd.estMeters ? parseFloat(cd.estMeters).toFixed(2) : '-') + '</td>' +
            '</tr>';
        });
      } else {
        html += '<tr><td>' + esc(fName) + '</td><td colspan="6" style="color:#999">无颜色数据</td></tr>';
      }
    });
    html += '</tbody></table>';
  } else {
    html += '<div style="color:#999;font-size:13px">无详细裁剪数据</div>';
  }
  html += '</div>';

  document.getElementById('detailBody').innerHTML = html;
  document.getElementById('detailOverlay').style.display = 'block';
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function escJs(s) { return (s || '').replace(/'/g, "\\'").replace(/"/g, '\\"'); }

render();
</script>
</body>
</html>
