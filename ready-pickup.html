<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<title>待拿货 · LUNA ATELIER</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C8A56D;--gold-light:#d4b98a;--cream:#f8f6f0;--border:#EBE8E3;--text:#1C1C1C;--text-muted:#999;--radius:8px;--success:#28a745;--success-bg:#e8f5e9}
body{font-family:'Inter',sans-serif;background:#F7F6F3;color:var(--text);-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto;padding:16px}
.header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;padding:0 16px;height:52px;gap:12px}
.logo{font-family:'Playfair Display',serif;font-size:14px;letter-spacing:3px;color:var(--text)}
.logo span{color:var(--gold)}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;color:var(--text)}
.page-title{font-size:13px;font-weight:500;color:var(--text-muted);letter-spacing:0.5px}
.stats-bar{display:flex;gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;text-align:center;flex:1;font-size:12px}
.stat-num{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--gold)}
.stat-label{font-size:10px;color:var(--text-muted);margin-top:2px;letter-spacing:0.5px}
.order-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.oc-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--cream);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:4px}
.oc-id{font-family:'SF Mono',Monaco,monospace;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:0.02em}
.oc-customer{font-size:13px;font-weight:600;color:var(--text)}
.oc-date{font-size:11px;color:var(--text-muted)}
.oc-body{padding:14px 16px}
.color-summary{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;padding:10px 12px;background:#faf9f6;border:1px solid var(--border);border-radius:6px}
.color-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500}
.color-dot{display:inline-block;width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.08);flex-shrink:0}
.color-chip .qty{color:var(--gold);font-weight:700}
.section-label{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:0.03em;text-transform:uppercase;margin-bottom:8px}
.pickup-form{display:flex;flex-direction:column;gap:6px}
.form-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.form-row label{font-size:12px;color:var(--text-muted);min-width:50px}
.form-row select,.form-row input{padding:7px 10px;border:1px solid #ddd;border-radius:5px;font-size:13px;font-family:inherit;background:#fff}
.form-row select:focus,.form-row input:focus{outline:none;border-color:var(--gold)}
.form-row select{flex:1;min-width:140px}
.price-ctrl{display:flex;align-items:center;gap:4px}
.price-ctrl .price-val{font-size:16px;font-weight:700;color:var(--text);min-width:60px;text-align:center}
.price-ctrl .price-unit{font-size:11px;color:var(--text-muted)}
.price-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;transition:all .15s}
.price-btn:hover{border-color:var(--gold);color:var(--gold)}
.history-box{margin:6px 0;padding:8px 12px;background:#faf9f6;border:1px solid var(--border);border-radius:5px;font-size:12px;line-height:1.6}
.history-box .h-title{font-weight:600;color:var(--text-muted);margin-bottom:2px;font-size:11px;text-transform:uppercase;letter-spacing:0.03em}
.history-box .h-item{color:var(--text);padding:1px 0}
.history-box .h-item .h-price{color:var(--gold);font-weight:600}
.oc-footer{padding:12px 16px;border-top:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 24px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;width:100%}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:#b8963e}
.btn-gold:disabled{opacity:.5;cursor:not-allowed}
.empty-state{text-align:center;padding:60px 20px;color:#ccc;font-size:13px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.fabric-matrix-wrap{overflow-x:auto;margin:0 0 12px;border:1px solid var(--border);border-radius:6px}
.fabric-matrix{width:100%;border-collapse:collapse;font-size:13px;min-width:300px}
.fabric-matrix thead th{background:var(--cream);padding:6px 8px;text-align:center;font-weight:600;color:var(--text);font-size:11px;border-bottom:1px solid var(--border);letter-spacing:0.03em}
.fabric-matrix tbody td{padding:5px 8px;text-align:center;border-bottom:1px solid var(--border);font-size:13px}
.fabric-matrix tbody tr:last-child td{border-bottom:none}
.matrix-color{font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap}
.matrix-dot{display:inline-block;width:14px;height:14px;border-radius:50%;border:1px solid rgba(0,0,0,.08);flex-shrink:0}
.matrix-qty{font-weight:700;font-size:14px;color:var(--text)}
.matrix-dot{cursor:pointer}
.print-swatches{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 12px}
.print-chip{display:flex;align-items:center;gap:7px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:var(--text)}
.print-chip img{width:34px;height:44px;object-fit:contain;border-radius:4px;background:#f7f6f3;border:1px solid #eee}
.print-chip b{color:var(--gold);font-size:12px}
/* Color Enlarge Overlay */
.color-enlarge-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;align-items:center;justify-content:center}
.color-enlarge-overlay.show{display:flex}
.color-enlarge-box{background:#fff;border-radius:10px;padding:16px;text-align:center;max-width:340px;width:85vw;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.color-enlarge-box .ce-img{width:100%;aspect-ratio:1;border-radius:6px;background:#f0ede8;background-size:contain;background-position:center;background-repeat:no-repeat;margin-bottom:10px}
.color-enlarge-box .ce-name{font-size:16px;font-weight:600;color:#1C1C1C}
/* Style Photo Overlay */
.style-photo-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9998;align-items:center;justify-content:center;padding:20px}
.style-photo-overlay.show{display:flex}
.style-photo-box{background:#fff;border-radius:10px;padding:20px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;text-align:center}
.style-photo-box img{width:100%;border-radius:6px;margin-bottom:12px;display:block}
.style-photo-box .sp-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}
.style-photo-box .sp-close{display:inline-block;margin-top:4px;padding:8px 28px;border:none;border-radius:6px;background:var(--gold);color:#fff;font-size:14px;cursor:pointer}
@media(max-width:640px){.form-row{flex-direction:column;align-items:stretch}.form-row label{min-width:auto}}
</style>
<style id="luna-nav-prehide">.luna-header,.header,.header-inner{display:none!important}</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <button class="back-btn" onclick="history.back()">←</button>
    <span class="logo">LUNA <span>A</span></span>
    <span class="page-title">🧵 待拿货 — 车缝车间</span>
  </div>
</div>
<div class="container">
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-num" id="pendingCount">0</div><div class="stat-label">待拿货</div></div>
    <div class="stat-card"><div class="stat-num" id="todayCount">0</div><div class="stat-label">今日已发料</div></div>
  </div>
  <div id="orderList"></div>
  <div id="emptyState" class="empty-state" style="display:none">
    <div>🎉 没有待拿货的订单</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Color Enlarge Overlay -->
<div class="color-enlarge-overlay" id="colorEnlargeOverlay" onclick="closeColorEnlarge(event)">
  <div class="color-enlarge-box">
    <div class="ce-img" id="ceImg"></div>
    <div class="ce-name" id="ceName"></div>
  </div>
</div>

<!-- Style Photo Overlay -->
<div class="style-photo-overlay" id="stylePhotoOverlay" onclick="closeStylePhotos(event)">
  <div class="style-photo-box" id="stylePhotoContent"></div>
</div>

<script src="luna-data.js?v=26"></script>
<script>LUNA.renderNav();</script>
<script>
LUNA.checkAuth();

var priceState = {}; // orderId -> currentPrice

function init() {
  var orders = LUNA.getPickupOrders();
  document.getElementById('pendingCount').textContent = orders.length;
  var todayStr = new Date().toISOString().slice(0,10);
  var todayDone = 0;
  var all = LUNA.getOrders();
  all.forEach(function(o){
    if(o.pickup_complete && o.pickup_complete.completed===1 && o.pickup_complete.time){
      var t=o.pickup_complete.time;
      if(t.split(' ')[0].replace(/\//g,'-')===todayStr) todayDone++;
    }
  });
  document.getElementById('todayCount').textContent = todayDone;
  renderOrders(orders);
}

function renderOrders(orders) {
  var c = document.getElementById('orderList');
  var empty = document.getElementById('emptyState');
  if (!orders.length) {
    c.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  var factories = [];
  try { factories = LUNA.getFactories(); } catch(e) {}
  var html = '';
  orders.forEach(function(o) { html += renderCard(o, factories); });
  c.innerHTML = html;
}

function getColorStyle(fabricName, colorName) {
  var printImg = findPrintVisual(colorName);
  if (printImg) return 'background-image:url(' + esc(printImg) + ');background-size:contain;background-position:center;background-repeat:no-repeat;background-color:#f7f6f3';
  var allFabrics = LUNA.getFabrics ? LUNA.getFabrics() : [];
  for (var fi = 0; fi < allFabrics.length; fi++) {
    if (allFabrics[fi].name === fabricName) {
      var cols = allFabrics[fi].colors || [];
      for (var ci = 0; ci < cols.length; ci++) {
        if (cols[ci].name === colorName) {
          if (cols[ci].img) return 'background-image:url(' + esc(cols[ci].img) + ');background-size:cover';
          return 'background:' + (cols[ci].hex || '#ccc');
        }
      }
    }
  }
  // Color not found in specified fabric → search all fabrics as fallback
  for (var fi = 0; fi < allFabrics.length; fi++) {
    var cols = allFabrics[fi].colors || [];
    for (var ci = 0; ci < cols.length; ci++) {
      if (cols[ci].name === colorName) {
        if (cols[ci].img) return 'background-image:url(' + esc(cols[ci].img) + ');background-size:cover';
        return 'background:' + (cols[ci].hex || '#ccc');
      }
    }
  }
  var hash = 0;
  for (var hi = 0; hi < colorName.length; hi++) { hash = colorName.charCodeAt(hi) + ((hash << 5) - hash); }
  return 'background:hsl(' + (Math.abs(hash) % 360) + ',50%,70%)';
}

function findPrintVisual(colorName) {
  var needle = String(colorName || '').trim().toLowerCase();
  var orders = LUNA.getOrders ? LUNA.getOrders() : [];
  for (var oi = 0; oi < orders.length; oi++) {
    var items = orders[oi].items || [];
    for (var ii = 0; ii < items.length; ii++) {
      var item = items[ii];
      if (!item.stampa_img_url) continue;
      var names = [item.color, item.stampa_code, item.sku_code, item.name].map(function(v) {
        return String(v || '').trim().toLowerCase();
      }).filter(Boolean);
      for (var ni = 0; ni < names.length; ni++) {
        if (names[ni] === needle || (needle && names[ni].indexOf(needle) >= 0) || (needle && needle.indexOf(names[ni]) >= 0)) return item.stampa_img_url;
      }
    }
  }
  return '';
}

function getOrderItemFabric(item) {
  var f = (item && item.fabric ? item.fabric : '').trim();
  if (f) return f;
  var style = (item && item.code && LUNA.findStyle) ? LUNA.findStyle(item.code) : null;
  var fabrics = (style && style.fabrics) || [];
  if (fabrics.length) {
    var first = fabrics[0];
    return (typeof first === 'string' ? first : (first.name || '')) || '默认面料';
  }
  return '默认面料';
}

function isPrintItem(item) {
  return !!(item && (item.stampa_img_url || item.item_type === 'stampa'));
}

function itemTotal(item) {
  var total = 0, qty = item.qty || {};
  Object.keys(qty).forEach(function(k) { total += Number(qty[k] || 0); });
  return total;
}

function renderPrintSwatches(order) {
  var prints = (order.items || []).filter(isPrintItem);
  if (!prints.length) return '';
  return '<div class="print-swatches">' + prints.map(function(item) {
    var label = item.stampa_code || item.color || '印花色卡';
    var img = item.stampa_img_url || '';
    return '<div class="print-chip" onclick="openPrintSwatch(\'' + escJs(img) + '\',\'' + escJs(label) + '\')" title="点击放大">' +
      '<img src="' + esc(img) + '" alt="">' +
      '<span>' + esc(label) + '</span><b>' + itemTotal(item) + '件</b></div>';
  }).join('') + '</div>';
}

function openPrintSwatch(img, name) {
  var el = document.getElementById('ceImg');
  document.getElementById('ceName').textContent = name || '印花色卡';
  el.style.backgroundImage = img ? 'url(' + esc(img) + ')' : 'none';
  el.style.backgroundColor = '#f0ede8';
  document.getElementById('colorEnlargeOverlay').classList.add('show');
}

function getColorCuttingTotals(order, onlyChecked) {
  var totals = {};
  var fabrics = order.cutting_complete && order.cutting_complete.fabrics;
  var checkmarks = (order.cutting_complete && order.cutting_complete.checkmarks) || {};
  if (fabrics) {
    // 计数只按面料 1 的数量（一件衣服可以有多种面料）
    var items = order.items || [];
    var fabric1 = '';
    if (items.length > 0) {
      var firstFabric = getOrderItemFabric(items[0]);
      fabric1 = firstFabric.split(',')[0].trim();
    }
    for (var fName in fabrics) {
      if (fabric1 && fName !== fabric1) continue; // 只取面料 1
      var colors = fabrics[fName].colors || {};
      for (var color in colors) {
        if (onlyChecked && !checkmarks[color]) continue;
        totals[color] = (totals[color] || 0) + (colors[color].total || 0);
      }
    }
  }
  // Fallback: if no per-color totals, compute from items
  if (Object.keys(totals).length === 0 && order.items) {
    order.items.forEach(function(item) {
      var c = item.color;
      if (!totals[c]) totals[c] = 0;
      if (item.qty) Object.keys(item.qty).forEach(function(s) { totals[c] += item.qty[s] || 0; });
    });
  }
  return totals;
}

function getColorVisual(fabricName, colorName) {
  var printImg = findPrintVisual(colorName);
  if (printImg) return printImg;
  var allFabrics = LUNA.getFabrics ? LUNA.getFabrics() : [];
  for (var fi = 0; fi < allFabrics.length; fi++) {
    if (allFabrics[fi].name === fabricName) {
      var cols = allFabrics[fi].colors || [];
      for (var ci = 0; ci < cols.length; ci++) {
        if (cols[ci].name === colorName) {
          if (cols[ci].img) return cols[ci].img;
          return cols[ci].hex || '#ccc';
        }
      }
    }
  }
  for (var fi = 0; fi < allFabrics.length; fi++) {
    var cols = allFabrics[fi].colors || [];
    for (var ci = 0; ci < cols.length; ci++) {
      if (cols[ci].name === colorName) {
        if (cols[ci].img) return cols[ci].img;
        return cols[ci].hex || '#ccc';
      }
    }
  }
  return '#ccc';
}

function openColorEnlarge(name, fabricName) {
  var visual = getColorVisual(fabricName, name);
  var isImg = visual.indexOf('http')===0||visual.indexOf('/photos/')===0||visual.indexOf('photos/')===0||visual.indexOf('data:')===0;
  if (isImg && LUNA.openImagePreview) {
    LUNA.openImagePreview(visual, name + (fabricName ? ' · ' + fabricName : ''));
    return;
  }
  var el = document.getElementById('ceImg');
  var nameEl = document.getElementById('ceName');
  nameEl.textContent = name;
  if (isImg) {
    el.style.backgroundImage = 'url(' + esc(visual) + ')';
    el.style.backgroundColor = 'transparent';
  } else {
    el.style.backgroundImage = 'none';
    el.style.backgroundColor = visual;
  }
  document.getElementById('colorEnlargeOverlay').classList.add('show');
}

function closeColorEnlarge(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('colorEnlargeOverlay').classList.remove('show');
}

function showStylePhotos(code) {
  var s = LUNA.findStyle ? LUNA.findStyle(code) : null;
  if (!s || !s.images || !s.images.length) { toast('没有款式照片'); return; }
  var html = '<div class="sp-title">ART-' + esc(code) + '</div>';
  s.images.forEach(function(img) {
    if (img) html += '<img src="' + esc(img) + '" alt="' + esc(code) + '" onerror="this.style.display=\'none\'">';
  });
  html += '<button class="sp-close" onclick="closeStylePhotos()">关闭</button>';
  document.getElementById('stylePhotoContent').innerHTML = html;
  document.getElementById('stylePhotoOverlay').classList.add('show');
}

function closeStylePhotos(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('stylePhotoOverlay').classList.remove('show');
}

function renderCard(order, factories) {
  var items = order.items || [];
  var firstCode = items.length > 0 ? (items[0].code || '') : '';
  var firstName = items.length > 0 ? (items[0].name || '') : '';
  var style = (firstCode && LUNA.findStyle) ? LUNA.findStyle(firstCode) : null;
  var totalCut = 0;
  var colorTotals = getColorCuttingTotals(order, true);

  // Per-color size breakdown from items
  var colorSizes = {};
  items.forEach(function(item) {
    var c = item.color || '';
    if (!colorSizes[c]) colorSizes[c] = {};
    var qty = item.qty || {};
    Object.keys(qty).forEach(function(s) {
      if (qty[s] > 0) colorSizes[c][s] = (colorSizes[c][s] || 0) + qty[s];
    });
  });

  // 撞色订单：保留各颜色独立显示
  for (var ct in colorTotals) totalCut += colorTotals[ct];
  if (!totalCut) totalCut = order.total_qty || 0;
  var laborCost = (style && style.laborCost) ? style.laborCost : 2.0;
  if (!priceState[order.id]) priceState[order.id] = laborCost;

  // Get factory history
  var history = [];
  if (firstCode && LUNA.getFactoryHistory) {
    history = LUNA.getFactoryHistory(firstCode);
  }

  // Build unique colors with fabric info for color swatches
  var colorFabrics = {};
  items.forEach(function(item) {
    if (!colorFabrics[item.color]) {
      var fab = getOrderItemFabric(item);
      if (item.item_type === 'contrast') {
        colorFabrics[item.color] = fab.split(/\s*,\s*/)[0] || fab;
      } else {
        colorFabrics[item.color] = fab;
      }
    }
  });

  var card = '<div class="order-card" id="card_' + escJs(order.id) + '">' +
    '<div class="oc-header">' +
    '<div style="display:flex;align-items:center;gap:10px">' +
    '<span style="font-size:13px;font-weight:600;color:var(--gold);cursor:pointer" onclick="showStylePhotos(\'' + escJs(firstCode) + '\')">ART-' + esc(firstCode) + '</span>' +
    '<span class="oc-customer">' + esc(order.customer) + (order.sub_customer?' <span style="color:#999;font-size:11px">('+esc(order.sub_customer)+')</span>':'') + '</span>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:12px">' +
    '<span style="font-size:13px;font-weight:600">裁 ' + totalCut + '件</span>' +
    '</div>' +
    '</div>' +
    '<div class="oc-body">' +
    '<div class="fabric-matrix-wrap"><table class="fabric-matrix">' +
    '<thead><tr><th>颜色</th>';

  // Collect unique sizes for matrix columns
  var allSizes = [];
  items.forEach(function(item) {
    var qty = item.qty || {};
    Object.keys(qty).forEach(function(s) {
      if (qty[s] > 0 && allSizes.indexOf(s) < 0) allSizes.push(s);
    });
  });
  var sizeOrder = { 'XS':0,'S':1,'M':2,'L':3,'XL':4,'XXL':5,'2XL':6,'3XL':7,'4XL':8 };
  allSizes.sort(function(a,b) { return (sizeOrder[a]||99) - (sizeOrder[b]||99); });
  allSizes.forEach(function(s) { card += '<th>' + esc(s) + '</th>'; });
  card += '<th>合计</th><th>裁剪</th></tr></thead><tbody>';

  var colorKeys = Object.keys(colorTotals);
  if (colorKeys.length > 0) {
    colorKeys.forEach(function(color) {
      var fabric = colorFabrics[color] || '';
      var sizes = colorSizes[color] || {};
      var orderTotal = 0;
      Object.keys(sizes).forEach(function(s) { orderTotal += sizes[s] || 0; });
      card += '<tr>' +
        '<td><div class="matrix-color"><span class="matrix-dot" style="' + getColorStyle(fabric, color) + '" onclick="openColorEnlarge(\'' + escJs(color) + '\',\'' + escJs(fabric) + '\')" title="点击放大"></span>' + esc(color) + '</div></td>';
      allSizes.forEach(function(s) {
        var v = sizes[s] || 0;
        card += '<td>' + (v > 0 ? '<span class="matrix-qty">' + v + '</span>' : '—') + '</td>';
      });
      card += '<td><span class="matrix-qty" style="color:var(--gold)">' + orderTotal + '</span></td>' +
        '<td><span class="matrix-qty" style="color:var(--text-muted)">' + colorTotals[color] + '</span></td></tr>';
    });
  } else {
    items.forEach(function(item) {
      var c = item.color || '';
      var fabric = getOrderItemFabric(item);
      var qty = item.qty || {};
      card += '<tr><td><div class="matrix-color"><span class="matrix-dot" style="' + getColorStyle(fabric, c) + '" onclick="openColorEnlarge(\'' + escJs(c) + '\',\'' + escJs(fabric) + '\')" title="点击放大"></span>' + esc(c) + '</div></td>';
      allSizes.forEach(function(s) {
        var v = qty[s] || 0;
        card += '<td>' + (v > 0 ? '<span class="matrix-qty">' + v + '</span>' : '—') + '</td>';
      });
      var totalQty = 0;
      Object.keys(qty).forEach(function(s) { totalQty += qty[s] || 0; });
      card += '<td><span class="matrix-qty" style="color:var(--gold)">' + totalQty + '</span></td>' +
        '<td><span style="color:#ccc">—</span></td></tr>';
    });
  }

  card += '</tbody></table></div>' +
    '<div class="pickup-form">';

  // Factory select + 工价 inline (no labels)
  card += '<div class="form-row" style="display:flex;align-items:center;justify-content:space-between;flex-direction:row;flex-wrap:nowrap">' +
    '<select id="pf_fact_' + escJs(order.id) + '" style="max-width:160px;flex:1">' +
    '<option value="">— 选择工厂 —</option>';
  factories.forEach(function(f) {
    var fName = (typeof f === 'string') ? f : (f.name || f.factory || '');
    card += '<option value="' + esc(fName) + '">' + esc(fName) + '</option>';
  });
  card += '</select>' +
    '<div class="price-ctrl" style="flex-shrink:0">' +
    '<button class="price-btn" onclick="adjPrice(\'' + escJs(order.id) + '\',-0.1)">−</button>' +
    '<span class="price-val" id="pv_' + escJs(order.id) + '">€' + priceState[order.id].toFixed(2) + '</span>' +
    '<button class="price-btn" onclick="adjPrice(\'' + escJs(order.id) + '\',0.1)">+</button>' +
    '</div>' +
    '</div>';

  // 辅料 + 包边（同行）+ 加工备注
  if (style) {
    var accNames = [];
    if (style.accessories && style.accessories.length) {
      style.accessories.forEach(function(a) { if (a.name) accNames.push(a.name); });
    }
    var hasAcc = accNames.length > 0;
    var hasEdge = !!style.edgeNote;
    if (hasAcc || hasEdge) {
      var parts = [];
      if (hasAcc) parts.push('<span style="color:var(--text-muted)">辅料:</span> ' + esc(accNames.join(', ')));
      if (hasEdge) parts.push('<span style="color:var(--text-muted)">包边:</span> ' + esc(style.edgeNote));
      card += '<div style="font-size:12px;color:var(--text);padding:2px 0">' + parts.join('&nbsp;&nbsp;') + '</div>';
    }
    if (style.processingNote) {
      card += '<div style="font-size:12px;color:var(--text);padding:2px 0"><span style="color:var(--text-muted)">加工备注:</span> ' + esc(style.processingNote) + '</div>';
    }
  }

  // Factory history (replaces operator)
  if (history.length > 0) {
    card += '<div class="history-box">' +
      '<div class="h-title">📋 曾加工工厂</div>';
    history.forEach(function(h) {
      card += '<div class="h-item">' + esc(h.factory) + ' <span class="h-price">€' + (h.price || 0).toFixed(2) + '</span> <span style="color:#999;font-size:11px">' + esc(h.orderId) + '</span></div>';
    });
    card += '</div>';
  }

  card += '</div></div>' + // close pickup-form, oc-body
    '<div class="oc-footer">' +
    '<button class="btn btn-gold" onclick="confirmPickup(\'' + escJs(order.id) + '\')">确认拿货-车缝中</button>' +
    '</div>' +
    '</div>';

  return card;
}

function adjPrice(orderId, delta) {
  var current = priceState[orderId] || 2.0;
  current = Math.max(0.5, Math.round((current + delta) * 100) / 100);
  priceState[orderId] = current;
  var el = document.getElementById('pv_' + orderId);
  if (el) el.textContent = '€' + current.toFixed(2);
}

function confirmPickup(orderId) {
  var factory = document.getElementById('pf_fact_' + orderId).value.trim();
  var user = LUNA.getUser ? LUNA.getUser() : null;
  var operator = (user && (user.name || user.username)) || '管理员';
  var price = priceState[orderId] || 2.0;
  if (!factory) { toast('请选择工厂'); return; }
  LUNA.showConfirm('确认将订单 ' + orderId + ' 发料给 ' + factory + '？\n工价: €' + price.toFixed(2) + '/件', function() {
    var result = LUNA.completePickup(orderId, factory, operator, price);
    if (result) {
      toast('✅ 发料成功');
      init();
    } else {
      toast('❌ 操作失败');
    }
  });
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function escJs(s) { return (s || '').replace(/'/g, "\\'").replace(/"/g, '\\"'); }

init();
window.addEventListener('luna-data-changed', function() { setTimeout(init, 100); });
</script>
</body>
</html>
