<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>款式管理 · LUNA ATELIER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#faf8f5;color:#1a1a1a;padding-bottom:60px}
a{text-decoration:none;color:inherit}
.page{max-width:980px;margin:0 auto;padding:20px 24px 48px}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.title{display:flex;align-items:baseline;gap:8px}
.title h1{font-size:18px;font-weight:700;color:#1a1a1a}
.count-badge{font-size:12px;color:#9d958a;font-weight:400}
.add-btn{display:inline-flex;align-items:center;justify-content:center;height:34px;padding:0 14px;border-radius:6px;background:#b8965a;color:#fff;font-size:13px;font-weight:600}
.add-btn:hover{background:#a07d45}
.table-wrap{background:#fff;border:1px solid #e8e2d9;border-radius:8px;overflow:visible}
.proc-table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}
.proc-table th{padding:10px 8px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.3px;color:#666;background:#faf8f5;border-bottom:2px solid #e8e5e0;white-space:nowrap}
.proc-table td{padding:10px 8px;border-bottom:1px solid #f0ede8;vertical-align:middle}
.proc-table tr:last-child td{border-bottom:none}
.proc-table th:first-child,.proc-table td:first-child{padding-left:12px}
.proc-table th:last-child,.proc-table td:last-child{padding-right:12px}
.style-code{font-weight:700;color:#c9a96e;font-size:13px}
.price{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.panel-msg{text-align:center;padding:56px 20px;color:#aaa;font-size:13px}
.guest-select{position:relative;min-width:180px}
.guest-select-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 9px;border:1px solid #e8e2d9;border-radius:6px;background:#fff;color:#333;font-family:inherit;font-size:12px;cursor:pointer;text-align:left;touch-action:manipulation}
.guest-select-btn:hover{border-color:#c9a96e}
.guest-select-summary{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.guest-select-caret{color:#b8965a;font-size:10px;flex:0 0 auto}
.guest-select-menu{display:none;position:absolute;left:0;top:calc(100% + 4px);width:260px;max-height:260px;overflow:auto;background:#fff;border:1px solid #e8e2d9;border-radius:8px;box-shadow:0 10px 26px rgba(0,0,0,.12);padding:6px;z-index:100;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.guest-select.open .guest-select-menu{display:block}
.guest-option{display:flex;align-items:center;gap:8px;padding:8px;border-radius:5px;font-size:12px;color:#333;cursor:pointer;line-height:1.3;touch-action:manipulation;user-select:none}
.guest-option:hover{background:#faf8f5}
.guest-option input{width:16px;height:16px;accent-color:#b8965a;flex:0 0 auto;pointer-events:none}
.guest-option.all{font-weight:600;color:#8a6a36;border-bottom:1px solid #f0ede8;margin-bottom:4px}
.toggle{width:34px;height:18px;border:0;border-radius:9px;background:#ddd;cursor:pointer;position:relative;display:inline-block;transition:background .15s;vertical-align:middle}
.toggle.on{background:#5a8f5a}
.toggle::after{content:"";width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.toggle.on::after{left:18px}
.edit-link{color:#c9a96e;font-size:12px;font-weight:600}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1c1c1c;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:700px){
  .page{padding:14px 10px 40px}
  .toolbar{align-items:flex-start}
  .title h1{font-size:16px}
  .add-btn{height:32px;padding:0 12px;font-size:12px;white-space:nowrap}
  .table-wrap{overflow:visible}
  .proc-table{font-size:12px}
  .proc-table th,.proc-table td{padding:8px 6px}
  .proc-table th:nth-child(2),.proc-table td:nth-child(2){width:64px}
  .proc-table th:nth-child(4),.proc-table td:nth-child(4){width:44px}
  .proc-table th:nth-child(5),.proc-table td:nth-child(5){width:44px}
  .guest-select{position:static;min-width:120px}
  .guest-select-menu{position:fixed;left:12px;right:12px;top:auto;bottom:18px;width:auto;max-height:55vh;padding:8px;z-index:10000}
  .guest-option{min-height:42px;font-size:13px}
  .guest-option input{width:18px;height:18px}
}
</style>
<style id="luna-nav-prehide">.luna-header,.header,.header-inner{display:none!important}</style>
</head>
<body>
<main class="page">
  <div class="toolbar">
    <div class="title">
      <h1>款式管理</h1>
      <span class="count-badge" id="countBadge">(0)</span>
    </div>
    <a class="add-btn" href="add-style.html">+ 添加款式</a>
  </div>
  <div class="table-wrap" id="stylePanel">
    <div class="panel-msg">加载中...</div>
  </div>
</main>
<div class="toast" id="toast"></div>

<script src="luna-data.js?v=26"></script>
<script>
LUNA.renderNav();
(function(){
  var u = LUNA.getUser();
  if (!u || u.role !== 'admin') window.location.href = 'index.html';
})();

var _suppressNextStyleRender = false;
var _saveTimers = {};

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function saveStyleAsync(style, successMessage) {
  if (!style || !style.code) return;
  if (LUNA._syncToLocalStorage) LUNA._syncToLocalStorage();

  clearTimeout(_saveTimers[style.code]);
  _saveTimers[style.code] = setTimeout(function() {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/styles', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.withCredentials = true;
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        if (successMessage) showToast(successMessage);
      } else {
        showToast('保存失败，请重试');
      }
    };
    xhr.onerror = function() {
      showToast('保存失败，请重试');
    };
    xhr.send(JSON.stringify(style));
  }, 80);
}

function guestValue(g) {
  return String(g.id || g.username || g.name || '');
}

function guestKeys(g) {
  return [g.id, g.username, g.name, g.shop_name].filter(Boolean).map(String);
}

function guestLabel(g) {
  var val = guestValue(g);
  return (g.shop_name ? g.shop_name + ' - ' : '') + (g.name || g.username || val);
}

function guestIsVisible(g, visible) {
  var keys = guestKeys(g);
  for (var i = 0; i < keys.length; i++) {
    if (visible.indexOf(keys[i]) !== -1) return true;
  }
  return false;
}

function selectedGuestValues(visible, guests) {
  var values = [];
  guests.forEach(function(g) {
    var val = guestValue(g);
    if (val && guestIsVisible(g, visible) && values.indexOf(val) === -1) values.push(val);
  });
  return values;
}

function visibleGuestSummary(visible, guests) {
  if (!visible.length) return '全部客人';
  var labels = [];
  guests.forEach(function(g) {
    if (guestIsVisible(g, visible)) labels.push(guestLabel(g));
  });
  if (!labels.length) return visible.length + ' 位客人';
  return labels.length <= 2 ? labels.join('、') : labels.slice(0, 2).join('、') + ' +' + (labels.length - 2);
}

function el(tag, className, text) {
  var node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined) node.textContent = text;
  return node;
}

function renderStyles() {
  var styles = [];
  var guests = [];
  try { styles = LUNA.getStyles() || []; } catch(e) {}
  try { guests = LUNA.getGuests ? (LUNA.getGuests() || []) : []; } catch(e) {}

  document.getElementById('countBadge').textContent = '(' + styles.length + ')';
  var panel = document.getElementById('stylePanel');
  panel.innerHTML = '';

  if (!styles.length) {
    panel.appendChild(el('div', 'panel-msg', '暂无款式，请先添加款式'));
    return;
  }

  var table = el('table', 'proc-table');
  var thead = document.createElement('thead');
  var headRow = document.createElement('tr');
  ['编号', '价格', '可见客人', '启用', '操作'].forEach(function(text, idx) {
    var th = document.createElement('th');
    th.textContent = text;
    if (idx === 1) th.style.textAlign = 'right';
    if (idx === 3) th.style.textAlign = 'center';
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  styles.forEach(function(style) {
    var code = String(style.code || '');
    var visible = (style.visibleGuests || []).map(String);
    var selectedValues = selectedGuestValues(visible, guests);
    var isOn = style.enabled !== false && style.enabled !== 0;

    var tr = document.createElement('tr');
    var codeCell = document.createElement('td');
    codeCell.appendChild(el('span', 'style-code', code));
    tr.appendChild(codeCell);

    var priceCell = el('td', 'price', 'EUR ' + Number(style.suggestedPrice || 0).toFixed(2));
    tr.appendChild(priceCell);

    var guestsCell = document.createElement('td');
    guestsCell.appendChild(buildGuestSelect(code, selectedValues, guests));
    tr.appendChild(guestsCell);

    var enabledCell = document.createElement('td');
    enabledCell.style.textAlign = 'center';
    var toggle = el('button', 'toggle' + (isOn ? ' on' : ''));
    toggle.type = 'button';
    toggle.setAttribute('aria-label', isOn ? '关闭客人可见' : '启用客人可见');
    toggle.onclick = function(event) {
      event.stopPropagation();
      toggleStyle(code);
    };
    enabledCell.appendChild(toggle);
    tr.appendChild(enabledCell);

    var editCell = document.createElement('td');
    var edit = el('a', 'edit-link', '编辑');
    edit.href = 'add-style.html?code=' + encodeURIComponent(code);
    editCell.appendChild(edit);
    tr.appendChild(editCell);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  panel.appendChild(table);
}

function buildGuestSelect(code, selectedValues, guests) {
  var wrap = el('div', 'guest-select');
  wrap.setAttribute('data-code', code);

  var btn = el('button', 'guest-select-btn');
  btn.type = 'button';
  btn.onclick = function(event) { toggleGuestDropdown(btn, event); };
  btn.appendChild(el('span', 'guest-select-summary', visibleGuestSummary(selectedValues, guests)));
  btn.appendChild(el('span', 'guest-select-caret', 'v'));
  wrap.appendChild(btn);

  var menu = el('div', 'guest-select-menu');
  menu.onclick = function(event) { event.stopPropagation(); };
  menu.ontouchstart = function(event) { event.stopPropagation(); };
  menu.appendChild(buildGuestOption('全部客人', '', !selectedValues.length, true));

  guests.forEach(function(g) {
    var val = guestValue(g);
    if (!val) return;
    menu.appendChild(buildGuestOption(guestLabel(g), val, !selectedValues.length || selectedValues.indexOf(val) !== -1, false));
  });
  wrap.appendChild(menu);
  return wrap;
}

function buildGuestOption(labelText, value, checked, isAll) {
  var label = el('label', 'guest-option' + (isAll ? ' all' : ''));
  var input = document.createElement('input');
  input.type = 'checkbox';
  input.checked = checked;
  if (value) input.setAttribute('data-value', value);
  label.appendChild(input);
  label.appendChild(document.createTextNode(labelText));
  label.onclick = function(event) {
    if (isAll) setAllVisibleGuests(label, event);
    else updateVisibleGuestChoice(label, event);
  };
  return label;
}

function toggleGuestDropdown(btn, event) {
  if (event) event.stopPropagation();
  var wrap = btn.closest('.guest-select');
  var isOpen = wrap.classList.contains('open');
  closeGuestDropdowns();
  if (!isOpen) wrap.classList.add('open');
}

function closeGuestDropdowns() {
  document.querySelectorAll('.guest-select.open').forEach(function(open) {
    open.classList.remove('open');
  });
}

function currentGuestSelection(wrap) {
  var selected = [];
  wrap.querySelectorAll('.guest-option input[data-value]').forEach(function(input) {
    if (input.checked) selected.push(input.getAttribute('data-value'));
  });
  return selected;
}

function syncGuestSelect(wrap, selected) {
  var guests = [];
  try { guests = LUNA.getGuests ? (LUNA.getGuests() || []) : []; } catch(e) {}
  var selectedMap = {};
  selected.forEach(function(v) { selectedMap[String(v)] = true; });

  wrap.querySelectorAll('.guest-option input[data-value]').forEach(function(input) {
    input.checked = selected.length === 0 || !!selectedMap[input.getAttribute('data-value')];
  });
  var all = wrap.querySelector('.guest-option.all input');
  if (all) all.checked = selected.length === 0;
  var summary = wrap.querySelector('.guest-select-summary');
  if (summary) summary.textContent = visibleGuestSummary(selected, guests);
}

function saveVisibleGuests(code, selected, wrap) {
  var styles = LUNA.getStyles();
  for (var i = 0; i < styles.length; i++) {
    if (String(styles[i].code) === String(code)) {
      styles[i].visibleGuests = selected;
      syncGuestSelect(wrap, selected);
      saveStyleAsync(styles[i], selected.length ? '已限制可见客人' : '已设为全部客人可见');
      break;
    }
  }
}

function setAllVisibleGuests(option, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  var wrap = option.closest('.guest-select');
  saveVisibleGuests(wrap.getAttribute('data-code'), [], wrap);
}

function updateVisibleGuestChoice(option, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  var wrap = option.closest('.guest-select');
  var input = option.querySelector('input');
  input.checked = !input.checked;
  var selected = currentGuestSelection(wrap);
  saveVisibleGuests(wrap.getAttribute('data-code'), selected, wrap);
}

function toggleStyle(code) {
  var styles = LUNA.getStyles();
  for (var i = 0; i < styles.length; i++) {
    if (String(styles[i].code) === String(code)) {
      var isOn = styles[i].enabled !== false && styles[i].enabled !== 0;
      styles[i].enabled = !isOn;
      saveStyleAsync(styles[i], styles[i].enabled ? '已启用，客人可见' : '已关闭，客人不可见');
      break;
    }
  }
  renderStyles();
}

function init() {
  renderStyles();
}

var _initDone = false;
window.addEventListener('luna-data-initialized', function() {
  if (!_initDone) { _initDone = true; init(); }
});
if (document.readyState === 'complete' || document.readyState === 'interactive') {
  setTimeout(function() {
    if (!_initDone) { _initDone = true; init(); }
  }, 300);
}
window.addEventListener('luna-data-changed', function() {
  if (_suppressNextStyleRender) {
    _suppressNextStyleRender = false;
    return;
  }
  renderStyles();
});
document.addEventListener('click', closeGuestDropdowns);
</script>
</body>
</html>
