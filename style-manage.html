<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#faf8f5;color:#1a1a1a;padding-bottom:60px}
a{text-decoration:none;color:inherit}
/* Header */
.header{background:#fff;border-bottom:1px solid #e8e2d9;padding:0 24px;height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-family:'Playfair Display',Georgia,serif;font-size:18px;letter-spacing:4px;font-weight:600;color:#1a1a1a;text-transform:uppercase}
.logo span{color:#b8965a}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.page-title{font-size:14px;font-weight:600;color:#1a1a1a;letter-spacing:.5px}
.header-btn{padding:8px 16px;background:#b8965a;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;text-decoration:none}
.header-btn:hover{background:#a07d45}
/* Side Menu */
.hamburger{font-size:22px;cursor:pointer;padding:4px 10px 4px 0;text-decoration:none;color:#666;background:none;border:none;font-family:inherit;line-height:1}
.hamburger:hover{color:#1a1a1a}
.side-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
.side-overlay.active{display:block}
.side-menu{position:fixed;top:0;left:0;bottom:0;width:270px;background:#fff;z-index:201;transform:translateX(-100%);transition:transform .2s ease;box-shadow:2px 0 12px rgba(0,0,0,.1);overflow-y:auto}
.side-menu.open{transform:translateX(0)}
.side-menu .sm-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid #f0ede8}
.side-menu .sm-header .sm-logo{font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:700;letter-spacing:2px;color:#1a1a1a}
.side-menu .sm-header .sm-close{font-size:18px;cursor:pointer;color:#999;background:none;border:none;font-family:inherit}
.side-menu .sm-section{padding:8px 0;border-bottom:1px solid #f5f2ef}
.side-menu .sm-section-title{font-size:9px;font-weight:600;color:#b5a58a;letter-spacing:1px;padding:0 16px 6px;text-transform:uppercase}
.side-menu .sm-link{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:13px;color:#555;text-decoration:none;transition:all .1s}
.side-menu .sm-link:hover{background:#faf9f6;color:#1a1a1a}
.side-menu .sm-link.active{background:#f7f4ee;color:#1c1c1c;font-weight:500}
.side-menu .sm-link.danger{color:#c44}
.side-menu .sm-link.danger:hover{background:#fef0f0;color:#c33}
/* Container */
.container{max-width:960px;margin:0 auto;padding:0 24px}
/* Controls */
.controls{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;flex-wrap:wrap;gap:10px}
.control-left{display:flex;align-items:center;gap:12px}
.control-left h1{font-size:16px;font-weight:700;color:#1a1a1a}
.count-badge{font-size:12px;color:#b0a99e;font-weight:400}
/* Table */
.table-wrap{background:#fff;border:1px solid #e8e2d9;border-radius:10px;overflow-x:auto}
.proc-table{width:100%;table-layout:fixed;border-collapse:collapse;font-size:13px}
.proc-table th{padding:10px 8px;text-align:left;font-weight:600;color:#666;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid #e8e5e0;background:#faf8f5;white-space:nowrap}
.proc-table td{padding:10px 8px;border-bottom:1px solid #f0ede8}
.proc-table th:first-child,.proc-table td:first-child{padding-left:12px}
.proc-table th:last-child,.proc-table td:last-child{padding-right:12px}
.proc-table tr:last-child td{border-bottom:none}
.proc-table tr:hover td{background:#faf8f5}
.tag{font-size:10px;padding:2px 8px;border-radius:3px;display:inline-block}
.tag.work{background:#f5edd8;color:#a08050}
.tag.material{background:#e0e8f0;color:#507090}
/* Toggle */
.toggle{width:34px;height:18px;border-radius:9px;background:#ddd;cursor:pointer;position:relative;display:inline-block;transition:all .15s}
.toggle.on{background:#5a8f5a}
.toggle .knob{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.toggle.on .knob{left:18px}
.panel-msg{text-align:center;padding:60px 20px;color:#aaa;font-size:13px}
/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1c1c1c;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:600px){
  .proc-table{font-size:12px}
  .proc-table th,.proc-table td{padding:8px}
}
</style>
<style id="luna-nav-prehide">.luna-header,.header,.header-inner{display:none!important}</style>
</head>

<div class="side-menu" id="sideMenu">
  <div class="sm-header">

    <button class="sm-close" onclick="toggleMenu()">✕</button>
  </div>
  <div class="sm-section">
    <div class="sm-section-title">款式</div>
    <a class="sm-link active" href="style-manage.html">📋 款式管理</a>

  </div>
</div>

<div class="container">
  <div class="controls">
    <div class="control-left">
      <h1>款式管理 <span class="count-badge" id="countBadge">(0)</span></h1>
      <a class="header-btn" href="add-style.html" style="font-size:12px;padding:6px 12px">+ 添加款式</a>
    </div>
  </div>
  <div class="table-wrap" id="stylePanel"></div>
</div>

<div class="toast" id="toast"></div>

<script src="luna-data.js?v=26"></script>
<script>LUNA.renderNav();</script>
<script>
(function(){var u=LUNA.getUser();if(!u||u.role!=='admin'){window.location.href='index.html';return;}})();
var SETTINGS = {
  KEYS: { styleToggles: 'luna_settings_style_toggles' },
  get: function(key) {
    var raw = localStorage.getItem(this.KEYS[key]);
    if (raw) { try { var d = JSON.parse(raw); return (Array.isArray(d) && d.length === 0) ? null : d; } catch(e) { return null; } }
    return null;
  },
  save: function(key, data) {
    localStorage.setItem(this.KEYS[key], JSON.stringify(data));
  }
};

function toggleMenu() {
  document.getElementById('sideOverlay').classList.toggle('active');
  document.getElementById('sideMenu').classList.toggle('open');
}

function logout() {
  LUNA.clearUser();
  window.location.href = 'index.html';
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function renderStyles() {
  var styles = [];
  try { styles = LUNA.getStyles(); } catch(e) {}
  var guests = [];
  try { guests = LUNA.getGuests ? (LUNA.getGuests() || []) : []; } catch(e) {}
  var toggles = SETTINGS.get('styleToggles') || {};
  document.getElementById('countBadge').textContent = '(' + styles.length + ')';
  var html = '';
  if (styles.length === 0) {
    html = '<div class="panel-msg">暂无款式，请先添加款式</div>';
    document.getElementById('stylePanel').innerHTML = html;
    return;
  }
  html += '<table class="proc-table">';
  html += '<tr><th>编号</th><th style="width:70px;text-align:right">价格</th><th style="min-width:150px">可见客人</th><th style="text-align:center;width:44px">启用</th><th style="width:44px">操作</th></tr>';
  styles.forEach(function(s) {
    var code = s.code;
    var isOn = toggles[code] !== false;
    var visible = (s.visibleGuests || []).map(String);
    html += '<tr>';
    html += '<td><strong style="color:#c9a96e;font-size:13px">' + esc(code) + '</strong></td>';
    html += '<td style="text-align:right">€' + ((s.suggestedPrice||0).toFixed(2)) + '</td>';
    html += '<td><select multiple size="3" onchange="updateVisibleGuests(\'' + esc(code) + '\',this)" style="min-width:140px;font-size:11px"><option value=""' + (visible.length ? '' : ' selected') + '>全部客人</option>';
    guests.forEach(function(g) {
      var val = String(g.id || g.username || g.name || '');
      var label = (g.shop_name ? g.shop_name + ' · ' : '') + (g.name || g.username || val);
      html += '<option value="' + esc(val) + '"' + (visible.indexOf(val) !== -1 ? ' selected' : '') + '>' + esc(label) + '</option>';
    });
    html += '</select></td>';
    html += '<td style="text-align:center"><span class="toggle' + (isOn ? ' on' : '') + '" onclick="toggleStyle(\'' + code + '\')"><span class="knob"></span></span></td>';
    html += '<td><a href="add-style.html?code=' + code + '" style="color:#c9a96e;font-size:11px;text-decoration:none">编辑</a></td>';
    html += '</tr>';
  });
  html += '</table>';
  document.getElementById('stylePanel').innerHTML = html;
}

function updateVisibleGuests(code, sel) {
  var styles = LUNA.getStyles();
  var selected = [];
  for (var i = 0; i < sel.options.length; i++) {
    var opt = sel.options[i];
    if (opt.selected && opt.value) selected.push(opt.value);
  }
  for (var j = 0; j < styles.length; j++) {
    if (styles[j].code === code) {
      styles[j].visibleGuests = selected;
      LUNA.saveStyles(styles);
      showToast(selected.length ? '已限制可见客人' : '已设为全部客人可见');
      break;
    }
  }
}

function toggleStyle(code) {
  var toggles = SETTINGS.get('styleToggles') || {};
  toggles[code] = toggles[code] === false ? true : false;
  SETTINGS.save('styleToggles', toggles);
  renderStyles();
}

function init() {
  renderStyles();
}

var _initDone = false;
if (typeof window !== 'undefined') {
  window.addEventListener('luna-data-initialized', function() {
    if (!_initDone) { _initDone = true; init(); }
  });
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(function() { if (!_initDone) { _initDone = true; init(); } }, 300);
  }
}

window.addEventListener('luna-data-changed', function() {
  renderStyles();
});
</script>
