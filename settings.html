<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>统一设置 · LUNA ATELIER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#faf9f7;color:#1a1a1a}
.header{display:flex;align-items:center;padding:12px 20px;background:#fff;border-bottom:1px solid #e8e5e0}
.header .logo{font-size:16px;font-weight:700;letter-spacing:1px;text-decoration:none;color:#1a1a1a;margin-right:auto}
.setting-wrap{max-width:960px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:2px;overflow-x:auto;background:#f0ede8;border-radius:6px;padding:3px;margin-bottom:20px;flex-wrap:nowrap}
.tabs::-webkit-scrollbar{height:0}
.tab{white-space:nowrap;padding:10px 14px;font-size:11px;font-weight:500;border:none;border-radius:4px;cursor:pointer;background:transparent;color:#888;font-family:inherit;transition:all .15s;flex-shrink:0}
.tab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.06);font-weight:600}
.panel{display:none}
.panel.active{display:block}
.btn-sm{padding:4px 10px;border:none;border-radius:3px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-sm.primary{background:#c9a96e;color:#fff}
.btn-sm.danger{background:#f5f5f5;color:#cc4444;border:1px solid #f0e8e0}
.btn-sm.success{background:#1a1a1a;color:#fff}
.add-row{margin-top:6px}
.add-row button{background:none;border:1px dashed #ddd;border-radius:4px;padding:6px 14px;font-size:11px;color:#999;cursor:pointer;font-family:inherit;transition:all .1s;width:100%}
.add-row button:hover{border-color:#c9a96e;color:#c9a96e}
/* Toggle */
.toggle{width:34px;height:18px;border-radius:9px;background:#ddd;cursor:pointer;position:relative;display:inline-block;transition:all .15s}
.toggle.on{background:#5a8f5a}
.toggle .knob{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.toggle.on .knob{left:18px}
/* Export */
.export-card{background:#fff;border:1px solid #e8e5e0;border-radius:6px;padding:16px}
.export-card h3{font-size:14px;font-weight:600;margin-bottom:4px}
.export-card p{font-size:11px;color:#888;margin-bottom:12px}
.export-row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
.export-row .field{display:flex;flex-direction:column;gap:3px}
.export-row .field label{font-size:10px;color:#888}
.export-row .field select{padding:6px 10px;border:1px solid #e8e5e0;border-radius:4px;font-size:12px;font-family:inherit;background:#fff}
.export-btn{padding:8px 16px;background:#c9a96e;color:#1a1a1a;border:none;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
/* ===== FABRIC WAREHOUSE ===== */
.fabric-card{background:#fff;border:1px solid #ebe8e3;border-radius:6px;padding:12px;margin-bottom:8px}
.fabric-row{display:flex;gap:8px;align-items:end;margin-bottom:6px;flex-wrap:wrap}
.fabric-row.end{align-items:center;margin-bottom:0}
.fabric-row .fi{display:flex;flex-direction:column;gap:2px}
.fabric-row .fi label{font-size:10px;color:#888;font-weight:500;white-space:nowrap}
.fabric-row .fi input{padding:6px 8px;border:1px solid #d5d0c9;border-radius:4px;font-size:14px;font-family:inherit;background:#faf9f7}
.fabric-row .fi input:focus{border-color:#c9a96e;outline:none;background:#fff}
.fabric-row .fi-grow{flex:1;min-width:0}
.fabric-row .fi-grow input{width:100%}
.fabric-row .fi input.num{width:75px;text-align:right}
.fabric-row .fi input.comp{width:100%}
.fabric-row .fi span.stock{font-size:20px;font-weight:700;font-family:'Playfair Display',serif;color:var(--text);min-width:130px;display:inline-block;text-align:right}
.fabric-row .fi input.add{width:85px;text-align:right}
.btn-stock{padding:6px 14px;border:none;border-radius:4px;background:#1a1a1a;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-stock:hover{background:#333}
.color-section-title{font-size:12px;font-weight:600;color:#8a7a6a;margin:12px 0 8px}
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px}
.color-entry{position:relative;border:1.5px solid #e8e5e0;border-radius:5px;padding:4px;background:#fff;text-align:center;transition:all .15s}
.color-entry:hover{border-color:#c9a96e;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.color-entry .color-box{width:100%;aspect-ratio:1;border-radius:3px;border:1px solid #f0ede8;cursor:pointer;background-size:cover;background-position:center;background-repeat:no-repeat}
.color-entry .color-box:hover{opacity:.9}
.color-entry .color-name{font-size:11px;color:#666;padding:4px 0 2px;width:100%;text-align:center;background:transparent;border:none;font-family:inherit;font-weight:500;display:block;outline:none}
.color-entry .color-name:focus{color:#1a1a1a;font-weight:700;border-bottom:1px solid #c9a96e}
.color-entry .color-actions{display:flex;position:absolute;top:4px;right:4px;gap:2px}
.color-entry:hover .color-actions{display:flex}
.color-entry .color-actions label,.color-entry .color-actions button{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:3px;border:none;cursor:pointer;font-size:11px;background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.1);font-family:inherit;transition:all .1s}
.color-entry .color-actions label:hover,.color-entry .color-actions button:hover{background:#fff;transform:scale(1.1)}
.color-entry .color-actions .del-btn{color:#e05050}
.color-entry .color-actions .del-btn:hover{color:#cc0000;background:#ffe8e8}
.color-entry .color-actions .upload-btn{color:#c9a96e;cursor:pointer}
.color-add-btn{width:100%;padding:10px;border:1.5px dashed #ddd;border-radius:5px;background:none;font-size:12px;color:#bbb;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.color-add-btn:hover{border-color:#c9a96e;color:#c9a96e;background:#faf6ee}
.fabric-add-btn{width:100%;padding:6px;border:1px dashed #ddd;border-radius:4px;background:none;font-size:11px;color:#999;cursor:pointer;font-family:inherit;margin-top:4px}
.fabric-add-btn:hover{border-color:#c9a96e;color:#c9a96e}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-img{background:#fff;padding:16px;border-radius:8px;text-align:center;max-width:320px}
.modal-img .big-box{width:220px;height:220px;border-radius:6px;border:1px solid #e8e5e0;margin:0 auto 10px;background-size:cover;background-position:center}
.modal-img .big-name{text-align:center;font-size:16px;font-weight:700;color:#1a1a1a}
.modal-close{position:absolute;top:20px;right:20px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.hamburger{font-size:22px;cursor:pointer;padding:4px 10px 4px 0;text-decoration:none;color:#666;background:none;border:none;font-family:inherit;line-height:1}
.hamburger:hover{color:#1a1a1a}
.side-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
.side-overlay.active{display:block}
.side-menu{position:fixed;top:0;left:0;bottom:0;width:270px;background:#fff;z-index:201;transform:translateX(-100%);transition:transform .2s ease;box-shadow:2px 0 12px rgba(0,0,0,.1);overflow-y:auto}
.side-menu.open{transform:translateX(0)}
.side-menu .sm-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid #f0ede8}
.side-menu .sm-header .sm-logo{font-size:15px;font-weight:700;letter-spacing:1px;color:#1a1a1a}
.side-menu .sm-header .sm-close{font-size:18px;cursor:pointer;color:#999;background:none;border:none;font-family:inherit}
.side-menu .sm-section{padding:8px 0;border-bottom:1px solid #f5f2ef}
.side-menu .sm-section-title{font-size:9px;font-weight:600;color:#b5a58a;letter-spacing:1px;padding:0 16px 6px;text-transform:uppercase}
.side-menu .sm-link{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:13px;color:#666;text-decoration:none;transition:all .1s}
.side-menu .sm-link:hover{background:#faf9f6;color:#1a1a1a}
.side-menu .sm-link.danger{color:#c44}
.side-menu .sm-link.danger:hover{background:#fef0f0;color:#c33}
/* Add color modal */
.add-color-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.add-color-overlay.active{display:flex}
.add-color-panel{background:#fff;border-radius:8px;padding:20px;width:320px;max-width:90vw}
.add-color-panel h3{font-size:14px;font-weight:600;margin-bottom:14px;color:#1a1a1a}
.add-color-panel .field-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.add-color-panel .field-group label{font-size:10px;color:#888;font-weight:500}
.add-color-panel .field-group input{padding:8px 10px;border:1px solid #e8e5e0;border-radius:4px;font-size:13px;font-family:inherit}
.add-color-panel .field-group input:focus{border-color:#c9a96e;outline:none}
.add-color-panel .color-preview{width:60px;height:60px;border-radius:4px;border:1px solid #ddd;margin-bottom:12px;background:#eee}
.add-color-panel .btn-row{display:flex;gap:8px;justify-content:flex-end}
.add-color-panel .btn-row button{padding:8px 16px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.add-color-panel .btn-row .confirm{background:#1a1a1a;color:#fff;border:none}
.add-color-panel .btn-row .cancel{background:#f5f5f5;color:#888;border:1px solid #e0e0e0}
/* Tables */
.proc-table{width:100%;border-collapse:collapse;font-size:12px}
.proc-table th{padding:8px 8px;text-align:left;font-weight:600;color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid #e8e5e0}
.proc-table td{padding:8px;border-bottom:1px solid #f0ede8}
.proc-table td input{width:100%;padding:5px 6px;border:1px solid #e8e5e0;border-radius:3px;font-size:11px;font-family:inherit}
.proc-table td input.num{width:60px;text-align:right}
.proc-table .tag{font-size:9px;padding:2px 6px;border-radius:2px;display:inline-block}
.proc-table .tag.work{background:#f5edd8;color:#a08050}
.proc-table .tag.material{background:#e0e8f0;color:#507090}
.panel-msg{text-align:center;padding:30px;color:#aaa;font-size:13px}
@media(max-width:480px){
  .tabs{overflow-x:auto}
  .tab{padding:8px 10px;font-size:10px}
  .setting-wrap{padding:10px}

  .fabric-row{gap:5px;margin-bottom:4px}

  .fabric-row .fi input.num{width:60px}
  .fabric-row .fi span.stock{font-size:16px;min-width:90px}
  .fabric-row .fi input.add{width:70px}
  .btn-stock{padding:5px 10px;font-size:11px}
  .color-grid{gap:4px}
  .color-entry{padding:3px}
  .color-entry .color-name{font-size:10px;padding:3px 0 1px}
}

<script>
// ===== 先触发数据同步（从 API 加载到 localStorage）=====
(function(){
  try {
    if (typeof LUNA !== 'undefined') {
      LUNA.getFabrics(); LUNA.getCategories(); LUNA.getProcAcc(); LUNA.getFactories();
    }
  } catch(e){}
})();

// ===== SETTINGS DATA LAYER =====
var SETTINGS = {
  KEYS: {
    fabrics: 'luna_settings_fabrics',
    factories: 'luna_settings_factories',
    procacc: 'luna_settings_procacc',
    categories: 'luna_settings_categories',
    guests: 'luna_settings_guests',
    styleToggles: 'luna_settings_style_toggles'
  },
  get: function(key) {
    var raw = localStorage.getItem(this.KEYS[key]);
    if (raw) {
      try {
        var d = JSON.parse(raw);
        return (Array.isArray(d) && d.length === 0) ? null : d;
      } catch(e) { return []; }
    }
    return null;
  },
  save: function(key, data) {
    localStorage.setItem(this.KEYS[key], JSON.stringify(data));
    if (typeof LUNA !== 'undefined' && LUNA.syncAllToServer) LUNA.syncAllToServer();
  }
};

// ===== INIT =====
function initSettings() {
  var keys = ['fabrics','factories','procacc','categories','guests'];
  var lsKeys = ['luna_settings_fabrics','luna_settings_factories','luna_settings_procacc','luna_settings_categories','luna_settings_guests'];

  // 第一阶段：读 localStorage，没有的话写默认值
  keys.forEach(function(k, i) {
    var data = SETTINGS.get(k);
    if (data !== null && !(Array.isArray(data) && data.length === 0)) return;
    localStorage.setItem(lsKeys[i], JSON.stringify(DEFAULTS[k]));
  });

  // 第二阶段：立即尝试从 LUNA 缓存加载（后台异步可能已完成）
  var gotServer = false;
  lsKeys.forEach(function(k, i) {
    var v = LUNA.get(k);
    if (v && Array.isArray(v) && v.length > 0) {
      localStorage.setItem(lsKeys[i], JSON.stringify(v));
      gotServer = true;
    }
  });

  renderAll();

  // 第三阶段：如果只是默认值（不是服务器数据），等后台加载完替换
  if (!gotServer) {
    window.addEventListener('luna-data-changed', function onData() {
      var found = false;
      lsKeys.forEach(function(k, i) {
        var v = LUNA.get(k);
        if (v && Array.isArray(v) && v.length > 0) {
          localStorage.setItem(lsKeys[i], JSON.stringify(v));
          found = true;
        }
      });
      if (found) {
        renderAll();
        window.removeEventListener('luna-data-changed', onData);
      }
    });
  }
}

// ===== RENDER ALL =====
function renderAll() {
  renderFactories();
  renderProcacc();
  renderCategories();

// ========== 7. EXPORT / BILLING (月结) ==========
function loadBilling() {
  var invoices = [];
  try { invoices = LUNA.getInvoices(); } catch(e) {}
  var customerFilter = document.getElementById('exportCustomer') ? document.getElementById('exportCustomer').value : 'all';
  var monthFilter = document.getElementById('exportMonth') ? document.getElementById('exportMonth').value : 'all';

  // Apply filters
  var filtered = invoices.filter(function(inv) {
    if (customerFilter !== 'all' && inv.customer !== customerFilter) return false;
    if (monthFilter !== 'all') {
      var invMonth = (inv.shipTime || inv.orderNo || '').substring(0, 7);
      if (invMonth !== monthFilter) return false;
    }
    return true;
  });

  // Collect unique customers and months for filters
  var customers = [], months = [];
  invoices.forEach(function(inv) {
    if (customers.indexOf(inv.customer) < 0) customers.push(inv.customer);
    var m = (inv.shipTime || inv.orderNo || '').substring(0, 7);
    if (m && months.indexOf(m) < 0) months.push(m);
  });
  months.sort().reverse();

  // Stats
  var totalQty = 0, totalAmount = 0;
  filtered.forEach(function(inv) { totalQty += inv.shippedQty; totalAmount += inv.total; });

  // Filter controls
  var filterHtml = '<div class="export-card" style="margin-bottom:12px">';
  filterHtml += '<h3>📊 账单核账管理（按发货时间计算）</h3>';
  filterHtml += '<p>以下账单基于已发货订单自动生成</p>';
  filterHtml += '<div class="export-row">';
  filterHtml += '<div class="field"><label>客人筛选</label><select id="exportCustomer" onchange="loadBilling()">';
  filterHtml += '<option value="all"' + (customerFilter==='all'?' selected':'') + '>全部客人</option>';
  customers.forEach(function(c) {
    filterHtml += '<option value="' + esc(c) + '"' + (customerFilter===c?' selected':'') + '>' + esc(c) + '</option>';
  });
  filterHtml += '</select></div>';
  filterHtml += '<div class="field"><label>月份筛选</label><select id="exportMonth" onchange="loadBilling()">';
  filterHtml += '<option value="all"' + (monthFilter==='all'?' selected':'') + '>全部月份</option>';
  months.forEach(function(m) {
    filterHtml += '<option value="' + m + '"' + (monthFilter===m?' selected':'') + '>' + m + '</option>';
  });
  filterHtml += '</select></div>';
  filterHtml += '<button class="export-btn" onclick="exportExcel()">📥 导出 Excel</button>';
  filterHtml += '</div></div>';

  // Stats bar
  filterHtml += '<div style="display:flex;gap:12px;padding:12px 14px;background:#faf9f6;border:1px solid #e8e5e0;border-radius:6px;flex-wrap:wrap;font-size:12px;margin-bottom:8px">';
  filterHtml += '<span>📄 账单数 <strong>' + filtered.length + '</strong></span>';
  filterHtml += '<span>📦 发货 <strong>' + totalQty + '</strong> 件</span>';
  filterHtml += '<span>💰 总金额 <strong style="color:#c9a96e;font-size:15px;">€' + totalAmount.toFixed(2) + '</strong></span>';
  filterHtml += '</div>';

  // Table
  if (filtered.length === 0) {
    filterHtml += '<div style="text-align:center;padding:30px;color:#aaa;font-size:13px;">暂无符合条件的账单</div>';
  } else {
    filterHtml += '<div style="background:#fff;border:1px solid #e8e5e0;border-radius:6px;overflow-x:auto">';
    filterHtml += '<table style="width:100%;border-collapse:collapse;font-size:12px;">';
    filterHtml += '<tr style="background:#faf9f6;"><th style="padding:8px 10px;text-align:left;border-bottom:2px solid #e8e5e0;font-size:10px;color:#888;">订单号</th><th style="padding:8px 10px;text-align:left;border-bottom:2px solid #e8e5e0;font-size:10px;color:#888;">编号</th><th style="padding:8px 10px;text-align:left;border-bottom:2px solid #e8e5e0;font-size:10px;color:#888;">客人</th><th style="padding:8px 10px;text-align:right;border-bottom:2px solid #e8e5e0;font-size:10px;color:#888;">发货数</th><th style="padding:8px 10px;text-align:right;border-bottom:2px solid #e8e5e0;font-size:10px;color:#888;">批发价€</th><th style="padding:8px 10px;text-align:right;border-bottom:2px solid #e8e5e0;font-size:10px;color:#888;">总金额€</th><th style="padding:8px 10px;text-align:center;border-bottom:2px solid #e8e5e0;font-size:10px;color:#888;">发货时间</th></tr>';
    filtered.forEach(function(inv) {
      filterHtml += '<tr><td style="padding:6px 10px;border-bottom:1px solid #f0ede8;font-weight:600;">' + esc(inv.orderNo) + '</td>';
      filterHtml += '<td style="padding:6px 10px;border-bottom:1px solid #f0ede8;color:#c9a96e;font-weight:600;">' + esc(inv.code) + '</td>';
      filterHtml += '<td style="padding:6px 10px;border-bottom:1px solid #f0ede8;">' + esc(inv.customer) + '</td>';
      filterHtml += '<td style="padding:6px 10px;border-bottom:1px solid #f0ede8;text-align:right;">' + inv.shippedQty + '</td>';
      filterHtml += '<td style="padding:6px 10px;border-bottom:1px solid #f0ede8;text-align:right;">' + inv.price.toFixed(2) + '</td>';
      filterHtml += '<td style="padding:6px 10px;border-bottom:1px solid #f0ede8;text-align:right;font-weight:600;">' + inv.total.toFixed(2) + '</td>';
      filterHtml += '<td style="padding:6px 10px;border-bottom:1px solid #f0ede8;text-align:center;font-size:11px;color:#888;">' + (inv.shipTime || '-') + '</td></tr>';
    });
    filterHtml += '<tr style="background:#faf9f6;font-weight:700;"><td colspan="3" style="padding:8px 10px;text-align:right;">合计</td><td style="padding:8px 10px;text-align:right;">' + totalQty + '</td><td></td><td style="padding:8px 10px;text-align:right;">€' + totalAmount.toFixed(2) + '</td><td></td></tr>';
    filterHtml += '</table></div>';
  }
  document.getElementById('panel-export').innerHTML = filterHtml;
}

function exportExcel() {
  var invoices = [];
  try { invoices = LUNA.getInvoices(); } catch(e) {}
  var customerFilter = document.getElementById('exportCustomer') ? document.getElementById('exportCustomer').value : 'all';
  var monthFilter = document.getElementById('exportMonth') ? document.getElementById('exportMonth').value : 'all';
  var filtered = invoices.filter(function(inv) {
    if (customerFilter !== 'all' && inv.customer !== customerFilter) return false;
    if (monthFilter !== 'all') {
      var invMonth = (inv.shipTime || inv.orderNo || '').substring(0, 7);
      if (invMonth !== monthFilter) return false;
    }
    return true;
  });

  if (filtered.length === 0) { alert('没有可导出的数据'); return; }

  // Build CSV
  var BOM = '\uFEFF';
  var csv = BOM + '订单号,编号,客人,发货数量,批发价€,总金额€,发货时间\n';
  filtered.forEach(function(inv) {
    csv += [inv.orderNo, inv.code, inv.customer, inv.shippedQty, inv.price.toFixed(2), inv.total.toFixed(2), inv.shipTime || ''].join(',') + '\n';
  });
  var totalQ = 0, totalA = 0;
  filtered.forEach(function(inv) { totalQ += inv.shippedQty; totalA += inv.total; });
  csv += '合计,,,' + totalQ + ',' + ',' + totalA.toFixed(2) + ',\n';

  // Download
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  var now = new Date();
  var dateStr = now.getFullYear() + '-' + ('0'+(now.getMonth()+1)).slice(-2) + '-' + ('0'+now.getDate()).slice(-2);
  link.download = '月结_' + dateStr + '.csv';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

// ===== UTILITY =====
function esc(s) {
  if (typeof s !== 'string') return s;
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function handleColorPhoto(input) {
  var file = input.files[0];
  if (!file) return;
  document.getElementById('uploadStatus').textContent = '处理中…';
  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    // 自动裁剪居中正方形
    autoCropSquare(dataUrl, function(croppedUrl) {
      newColorImg = croppedUrl;
      document.getElementById('newColorPreview').style.background = 'url(' + croppedUrl + ') center/cover no-repeat';
      document.getElementById('uploadStatus').textContent = '分析颜色中…';
      extractDominantColor(croppedUrl, function(rgb) {
        document.getElementById('newColorHex').value = rgbToHex(rgb[0], rgb[1], rgb[2]);
        var name = colorNameFromRGB(rgb[0], rgb[1], rgb[2]);
        document.getElementById('newColorName').value = name;
        document.getElementById('uploadStatus').textContent = '✅ 已识别: ' + name;
      });
    });
  };
  reader.readAsDataURL(file);
}

function autoCropSquare(dataUrl, callback) {
  var img = new Image();
  img.onload = function() {
    var size = Math.min(img.width, img.height);
    var sx = Math.round((img.width - size) / 2);
    var sy = Math.round((img.height - size) / 2);
    var canvas = document.createElement('canvas');
    canvas.width = 200;
    canvas.height = 200;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, sx, sy, size, size, 0, 0, 200, 200);
    callback(canvas.toDataURL('image/jpeg', 0.7));
  };
  img.src = dataUrl;
}

function extractDominantColor(dataUrl, callback) {
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    var canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, img.width, img.height);
    var imageData = ctx.getImageData(0, 0, img.width, img.height);
    var data = imageData.data;
    var buckets = {};
    for (var i = 0; i < data.length; i += 16) {
      var r = Math.round(data[i] / 32) * 32;
      var g = Math.round(data[i+1] / 32) * 32;
      var b = Math.round(data[i+2] / 32) * 32;
      var key = r + ',' + g + ',' + b;
      if (!buckets[key]) buckets[key] = 0;
      buckets[key]++;
    }
    var maxCount = 0, dominantKey = '0,0,0';
    for (var k in buckets) {
      if (buckets[k] > maxCount) {
        maxCount = buckets[k];
        dominantKey = k;
      }
    }
    var parts = dominantKey.split(',');
    callback([parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2])]);
  };
  img.src = dataUrl;
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(function(c) {
    var h = Math.round(c).toString(16);
    return h.length === 1 ? '0' + h : h;
  }).join('');
}

function colorNameFromRGB(r, g, b) {
  var max = Math.max(r, g, b), min = Math.min(r, g, b);
  var delta = max - min;
  var h = 0;
  if (delta > 0) {
    if (max === r) h = ((g - b) / delta) % 6;
    else if (max === g) h = (b - r) / delta + 2;
    else h = (r - g) / delta + 4;
    h = Math.round(h * 60);
    if (h < 0) h += 360;
  }
  var s = max > 0 ? delta / max : 0;
  var v = max / 255;

  // 无彩色系
  if (s < 0.08) {
    if (v > 0.92) return '白色';
    if (v < 0.15) return '黑色';
    if (v < 0.35) return '深灰';
    if (v < 0.55) return '中灰';
    return '浅灰';
  }

  // 色相命名
  if (h < 15 || h >= 345) return v < 0.4 ? '酒红' : (v < 0.65 ? '红色' : '浅红');
  if (h < 30) return v < 0.5 ? '棕红' : '橙色';
  if (h < 45) return v < 0.5 ? '棕色' : '杏色';
  if (h < 70) return v < 0.5 ? '橄榄绿' : '米黄';
  if (h < 100) return v < 0.4 ? '墨绿' : '黄绿';
  if (h < 150) return v < 0.35 ? '深绿' : (v < 0.7 ? '绿色' : '浅绿');
  if (h < 190) return v < 0.4 ? '深青' : '青色';
  if (h < 210) return v < 0.4 ? '深蓝' : '天蓝';
  if (h < 260) return v < 0.3 ? '藏青' : (v < 0.6 ? '蓝色' : '浅蓝');
  if (h < 290) return v < 0.4 ? '深紫' : (v < 0.7 ? '紫色' : '浅紫');
  if (h < 330) return v < 0.4 ? '紫红' : '粉红';
  return v < 0.5 ? '酒红' : '粉色';
}

function confirmAddColor() {
  if (addTargetFabric === null) return;
  var name = document.getElementById('newColorName').value.trim();
  if (!name) { alert('请输入颜色名称'); return; }
  var hex = document.getElementById('newColorHex').value;
  var fabrics = SETTINGS.get('fabrics');
  if (!fabrics[addTargetFabric]) return;
  if (!fabrics[addTargetFabric].colors) fabrics[addTargetFabric].colors = [];
  var color = {name: name, hex: hex};
  if (newColorImg) color.img = newColorImg;
  fabrics[addTargetFabric].colors.push(color);
  SETTINGS.save('fabrics', fabrics);
  closeAddColor();
  renderWarehouse();
}
