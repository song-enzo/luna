<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<title>订单管理 · LUNA ATELIER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#faf9f7;color:#1a1a1a}
.header{display:flex;align-items:center;padding:0 16px;height:54px;background:#fff;border-bottom:1px solid #e8e5e0;position:sticky;top:0;z-index:100}
.hamburger{font-size:22px;cursor:pointer;padding:4px 10px 4px 0;background:none;border:none;color:#666;font-family:inherit;line-height:1}
.hamburger:hover{color:#1a1a1a}
.header .logo{font-size:16px;font-weight:700;letter-spacing:1px;text-decoration:none;color:#1a1a1a;margin-right:auto}
.side-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
.side-overlay.active{display:block}
.side-menu{position:fixed;top:0;left:0;bottom:0;width:270px;background:#fff;z-index:201;transform:translateX(-100%);transition:transform .2s ease;box-shadow:2px 0 12px rgba(0,0,0,.1);overflow-y:auto}
.side-menu.open{transform:translateX(0)}
.side-menu .sm-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid #f0ede8}
.side-menu .sm-header .sm-logo{font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:700;letter-spacing:2px;color:#1a1a1a}
.side-menu .sm-header .sm-close{font-size:18px;cursor:pointer;color:#999;background:none;border:none;font-family:inherit}
.side-menu .sm-section{padding:8px 0;border-bottom:1px solid #f5f2ef}
.side-menu .sm-section-title{font-size:9px;font-weight:600;color:#b5a58a;letter-spacing:1px;padding:0 16px 6px;text-transform:uppercase}
.side-menu .sm-link{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:13px;color:#555;text-decoration:none;transition:all .1s}
.side-menu .sm-link:hover{background:#faf9f6;color:#1a1a1a}
.side-menu .sm-link.danger{color:#c44}
.side-menu .sm-link.danger:hover{background:#fef0f0;color:#c33}
.page{max-width:960px;margin:0 auto;padding:16px}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1px solid #e0dcd5;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#888;font-family:inherit;transition:all .15s}
.filter-btn:hover{border-color:#c9a96e;color:#c9a96e}
.filter-btn.active{background:#c9a96e;color:#fff;border-color:#c9a96e}
.search-bar{flex:1;min-width:160px;padding:7px 12px;border:1px solid #e0dcd5;border-radius:20px;font-size:12px;font-family:inherit;outline:none}
.search-bar:focus{border-color:#c9a96e}
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;font-size:12px;color:#888}
.stats span{padding:6px 14px;background:#fff;border:1px solid #e8e5e0;border-radius:6px}
.stats strong{color:#1a1a1a}
.order-card{background:#fff;border:1px solid #e8e5e0;border-radius:8px;margin-bottom:12px;overflow:hidden}
.oc-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#faf8f5;border-bottom:1px solid #f0ede8;flex-wrap:wrap;gap:4px}
.oc-id{font-weight:700;font-size:13px;color:#c9a96e}
.oc-customer{font-size:13px;color:#1a1a1a;font-weight:500}
.oc-date{font-size:11px;color:#999}
.oc-body{padding:10px 16px}
.oc-item{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid #f5f2ef;font-size:12px}
.oc-item:last-child{border-bottom:none}
.oc-item .code{font-weight:600;color:#c9a96e;min-width:80px}
.oc-item .detail{color:#666;flex:1}
.oc-item .qty{color:#999;white-space:nowrap}
.oc-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid #f0ede8;flex-wrap:wrap;gap:6px}
.oc-status{font-size:11px;padding:3px 10px;border-radius:4px;font-weight:500}
.status-pending{background:#f5f5f5;color:#999}
.status-confirmed{background:#fff3e0;color:#e8a040}
.status-cutting{background:#e3f0fa;color:#5090c0}
.status-pickup{background:#eef5e8;color:#709050}
.status-sewing{background:#eef5e8;color:#709050}
.status-shipped{background:#e8f5e9;color:#2e7d32}
.status-completed{background:#f0f0f0;color:#888}
.oc-note{font-size:11px;color:#c44;padding:4px 16px;background:#fff8f6}
.empty-state{text-align:center;padding:60px 20px;color:#ccc;font-size:13px}
@media(max-width:600px){.page{padding:10px}.oc-header{padding:8px 12px}.oc-body{padding:8px 12px}}
</style>
</head>
<body>
<div class="header">
  <button class="hamburger" onclick="toggleMenu()">☰</button>
  <span class="logo">📋 订单管理</span>
</div>
<div class="side-overlay" id="sideOverlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
  <div class="sm-header">
    <span class="sm-logo">LUNA ATELIER</span>
    <button class="sm-close" onclick="toggleMenu()">✕</button>
  </div>
  <div class="sm-section">
    <div class="sm-section-title">款式</div>
    <a class="sm-link" href="guest-styles.html">👗 款式浏览</a>
    <a class="sm-link" href="add-style.html">➕ 添加款式</a>
  </div>
  <div class="sm-section">
    <div class="sm-section-title">订单</div>
    <a class="sm-link" href="my-orders.html">📋 我的订单</a>
    <a class="sm-link" href="orders.html">📋 订单管理</a>
  </div>
  <div class="sm-section">
    <div class="sm-section-title">管理</div>
    <a class="sm-link" href="change-password.html">🔑 修改密码</a>
    <a class="sm-link" href="login-logs.html">🔍 登录记录</a>
    <a class="sm-link" href="dashboard.html">🏠 工作台</a>
    <a class="sm-link danger" href="javascript:void(0)" onclick="logout()">🚪 退出账号</a>
  </div>
</div>
<div class="page">
  <div class="filters">
    <button class="filter-btn active" data-status="all" onclick="setFilter('all',this)">全部</button>
    <button class="filter-btn" data-status="confirmed" onclick="setFilter('confirmed',this)">打唛架中</button>
    <button class="filter-btn" data-status="cutting" onclick="setFilter('cutting',this)">裁剪中</button>
    <button class="filter-btn" data-status="pickup" onclick="setFilter('pickup',this)">待拿货</button>
    <button class="filter-btn" data-status="sewing" onclick="setFilter('sewing',this)">车缝中</button>
    <button class="filter-btn" data-status="shipped" onclick="setFilter('shipped',this)">已发货</button>
    <input class="search-bar" id="searchInput" placeholder="搜索订单号、客人..." oninput="renderOrders()">
  </div>
  <div class="stats" id="statsBar"></div>
  <div id="orderList"></div>
</div>
<script src="luna-data.js?v=19"></script>
<script>LUNA.renderNav();</script>
<script>
function toggleMenu(){document.getElementById('sideMenu').classList.toggle('open');document.getElementById('sideOverlay').classList.toggle('active')}
function logout(){LUNA.clearUser();window.location.href='index.html'}
var currentFilter='all';
var user=LUNA.getUser();
var isAdmin=user&&user.role==='admin';
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function getStatusName(s){var m={confirmed:'打唛架中',cutting:'裁剪中',pickup:'待拿货',sewing:'车缝中',shipped:'已发货',completed:'已完成'};return m[s]||s}
function setFilter(s,el){currentFilter=s;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});if(el)el.classList.add('active');renderOrders()}
function deleteOrder(id){LUNA.showConfirm('确认永久删除订单 '+id+' ？此操作不可撤销，所有数据将被清除。',function(){var err=LUNA.deleteOrder(id,true);if(err===true){renderOrders()}else{LUNA.showAlert('删除失败: '+err)}})}
function renderOrders(){
  var orders=LUNA.getOrders();
  var search=(document.getElementById('searchInput').value||'').toLowerCase();
  var total=orders.length,active=orders.filter(function(o){return LUNA.getOrderStatus(o)!=='shipped'&&LUNA.getOrderStatus(o)!=='completed'}).length;
  document.getElementById('statsBar').innerHTML='<span>📄 总订单 <strong>'+total+'</strong></span><span>⚡ 进行中 <strong>'+active+'</strong></span>';
  var f=orders.filter(function(o){var st=LUNA.getOrderStatus(o);if(currentFilter!=='all'&&st!==currentFilter)return false;if(search){var m=o.id.toLowerCase().indexOf(search)>=0||(o.customer||'').toLowerCase().indexOf(search)>=0||(o.sub_customer||'').toLowerCase().indexOf(search)>=0;if(!m)return false}return true});
  if(!f.length){document.getElementById('orderList').innerHTML='<div class="empty-state">暂无符合条件的订单</div>';return}
  var html='';
  f.reverse().forEach(function(o){
    var st=LUNA.getOrderStatus(o);
    html+='<div class="order-card"><div class="oc-header"><span class="oc-id">'+esc(o.id)+'</span><span class="oc-customer">'+esc(o.customer)+(o.sub_customer?' <span style="color:#999;font-size:11px">(二级: '+esc(o.sub_customer)+')</span>':'')+'</span><span class="oc-date">📅 '+(o.date||'')+'</span></div><div class="oc-body">';
    (o.items||[]).forEach(function(item){
      var qs='';if(item.qty){for(var sz in item.qty){qs+=(qs?' ':'')+sz+'×'+item.qty[sz]}}
      html+='<div class="oc-item"><span class="code">'+esc(item.code)+'</span><span class="detail">'+esc(item.color||'')+'</span><span class="qty">'+qs+'</span></div>'});
    html+='</div>';
    if(o.note)html+='<div class="oc-note">📝 '+esc(o.note)+'</div>';
    html+='<div class="oc-footer"><span class="oc-status status-'+st+'">'+getStatusName(st)+'</span><div class="oc-actions"><a href="order-detail.html?id='+encodeURIComponent(o.id)+'" style="padding:5px 10px;border:1px solid #ddd;border-radius:4px;font-size:11px;text-decoration:none;color:#666">详情</a>'+(isAdmin?'<button onclick="deleteOrder(\''+encodeURIComponent(o.id)+'\')" style="padding:5px 10px;border:1px solid #e88;border-radius:4px;font-size:11px;color:#c44;background:#fff;cursor:pointer;margin-left:6px">删除</button>':'')+'</div></div></div>'
  });
  document.getElementById('orderList').innerHTML=html;
}
renderOrders();
window.addEventListener('luna-data-changed',function(){setTimeout(renderOrders,100)});
</script>
</body>
</html>
