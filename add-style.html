<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>添加款式 · LUNA ATELIER</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#faf9f7;color:#1a1a1a}
.header{display:flex;align-items:center;padding:12px 20px;background:#fff;border-bottom:1px solid #e8e5e0;position:sticky;top:0;z-index:100}
.header .back{font-size:20px;cursor:pointer;padding:4px 12px 4px 0;text-decoration:none;color:#666}
.header .logo{font-size:16px;font-weight:700;letter-spacing:1px;text-decoration:none;color:#1a1a1a;margin-right:auto}

.page{max-width:650px;margin:0 auto;padding:20px 16px 40px}
.section{background:#fff;border:1px solid #ebe8e3;border-radius:6px;padding:14px 16px;margin-bottom:8px}
.section-title{font-size:12px;font-weight:600;color:#b5a58a;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-title .add-action{font-size:11px;color:#c9a96e;cursor:pointer;background:none;border:none;font-family:inherit}

/* Carousel (Swiper) */
.carousel-wrap{position:relative;margin:0;border-radius:6px;overflow:hidden;background:#f0ede8}
.carousel-wrap .swiper-slide{display:flex;align-items:center;justify-content:center;background:#f0ede8}
.carousel-wrap .swiper{overflow:hidden}
.carousel-wrap .swiper-wrapper{align-items:center}
.carousel-wrap .swiper-slide{height:auto;position:relative}
.carousel-wrap .swiper-slide img{width:100%;height:auto;object-fit:contain;display:block;aspect-ratio:3/4;max-height:65vh}
.carousel-wrap .swiper-pagination{position:relative;bottom:auto!important;padding:8px 0 4px;line-height:1}
.carousel-wrap .swiper-pagination-bullet{width:5px;height:5px;background:#ddd;opacity:1;transition:all .2s}
.carousel-wrap .swiper-pagination-bullet-active{background:#C8A56D;width:14px;border-radius:3px}
.carousel-wrap .swiper-button-next,.carousel-wrap .swiper-button-prev{color:#fff;background:rgba(0,0,0,.3);width:36px;height:36px;border-radius:50%;transition:all .25s;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.carousel-wrap .swiper-button-next:after,.carousel-wrap .swiper-button-prev:after{font-size:14px;font-weight:700}
.carousel-wrap .swiper-button-next:hover,.carousel-wrap .swiper-button-prev:hover{background:rgba(200,165,109,.8);transform:scale(1.08)}
.carousel-wrap .del-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:11px;cursor:pointer;line-height:24px;text-align:center;z-index:10;transition:background .15s}
.carousel-wrap .del-btn:hover{background:rgba(200,0,0,.7)}
.carousel-wrap .main-star{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:13px;cursor:pointer;line-height:24px;text-align:center;z-index:10;transition:all .15s;font-family:inherit}
.carousel-wrap .main-star:hover{background:rgba(200,170,60,.8)}
.carousel-wrap .main-star.active{background:#c9a96e;color:#fff;box-shadow:0 0 6px rgba(201,169,110,.6)}
.top-row{display:flex;align-items:center;gap:8px;margin-top:6px;justify-content:center}
.upload-btn{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border:1px solid #ebe8e3;border-radius:4px;background:#faf9f7;cursor:pointer;font-size:13px;color:#888;font-family:inherit;transition:all .15s}
.upload-btn:hover{border-color:#c9a96e;background:#f7f4ee;color:#1c1c1c}

/* Form */
.form-row{display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap}
.form-row .field{flex:1;min-width:80px}
.form-row .field.sm{flex:0 0 70px}
.form-row .field.xs{flex:0 0 50px}
.field label{display:block;font-size:11px;font-weight:500;color:#b5a58a;margin-bottom:3px;letter-spacing:.3px}
.field input,.field select{width:100%;padding:8px 10px;border:1px solid #ebe8e3;border-radius:3px;font-size:13px;font-family:inherit;background:#faf9f7;color:#1c1c1c}
.field input:focus,.field select:focus{border-color:#c9a96d;outline:none;background:#fff}
.field input.num{max-width:55px;text-align:right}
.field textarea{width:100%;padding:8px 10px;border:1px solid #ebe8e3;border-radius:3px;font-size:13px;font-family:inherit;resize:vertical;background:#faf9f7}

/* Type Switch */
.type-switch{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.type-switch .switch-label{font-size:12px;color:#b5a58a;font-weight:500;min-width:40px}
.type-switch .switch-toggle{display:flex;background:#f0eee9;border-radius:4px;padding:2px;gap:2px}
.type-switch .switch-toggle button{padding:4px 10px;font-size:11px;border:none;border-radius:3px;cursor:pointer;font-family:inherit;background:transparent;color:#999;transition:all .15s;font-weight:500}
.type-switch .switch-toggle button.active{background:#fff;color:#1c1c1c;box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:600}

/* Dynamic rows */
.dynamic-row{display:flex;gap:4px;align-items:center;padding:4px 0;border-bottom:1px solid #f5f3f0;flex-wrap:wrap}
.dynamic-row select{flex:1;min-width:80px;padding:7px 8px;border:1px solid #ebe8e3;border-radius:3px;font-size:13px;font-family:inherit;background:#faf9f7}
.dynamic-row input.num{width:50px;padding:7px 8px;border:1px solid #ebe8e3;border-radius:3px;font-size:13px;text-align:right;font-family:inherit}
.dynamic-row .tag{font-size:11px;padding:2px 6px;border-radius:2px;flex-shrink:0}
.dynamic-row .tag.work{background:#f5edd8;color:#a08050;border-left:2px solid #c9a96d}
.dynamic-row .tag.material{background:#e0e8f0;color:#507090;border-left:2px solid #708090}
.dynamic-row .subtotal{font-size:13px;font-weight:600;color:#1c1c1c;min-width:40px;text-align:right}
.dynamic-row .del-row{color:#ccc;cursor:pointer;font-size:14px;padding:0 4px;flex-shrink:0}

.cost-bar{display:flex;justify-content:space-between;padding:8px 0;font-size:12px;border-top:1px solid #ebe8e3;margin-top:6px}
.cost-bar .total{font-weight:700;font-size:14px}
.cost-bar .markup{display:flex;align-items:center;gap:4px;font-size:11px;color:#888}
.cost-bar .markup input{width:40px;padding:2px 4px;border:1px solid #ddd;border-radius:2px;font-size:11px;text-align:right;font-family:inherit}

.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-save{flex:1;padding:14px;background:#c9a96e;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-cancel{flex:0.4;padding:14px;border:1px solid #ddd;background:#fff;color:#666;border-radius:4px;font-size:14px;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none}

.success-message{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:2px solid #c9a96e;border-radius:8px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:1000;display:none}
.success-message.show{display:block}
</style>
<script src="luna-data.js?v=26"></script>
<style id="luna-nav-prehide">.luna-header,.header,.header-inner{display:none!important}</style>
</head>
<body>
<div class="header">
  <a href="guest-styles.html" class="back">←</a>
  <span class="logo" id="pageTitle">➕ 添加款式</span>
</div>
<div class="page">
  <!-- Photos Section → Swiper 翻页轮播 -->
  <div class="section">
    <div class="section-title">📸 款式照片</div>
    <div class="carousel-wrap" id="carouselWrap">
      <div class="swiper" id="carouselSwiper">
        <div class="swiper-wrapper" id="carouselTrack"></div>
        <div class="swiper-pagination" id="carouselDots"></div>
      </div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
      <div class="carousel-counter" id="carouselCounter">0/0</div>
    </div>
    <div class="top-row">
      <label for="photoInput" class="upload-btn">📷 上传照片</label>
      <label for="cameraInput" class="upload-btn" style="margin-left:6px">📸 拍照</label>
    </div>
    <input type="file" id="photoInput" accept="image/*" multiple style="display:none">
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
  </div>

  <!-- Style Info Section -->
  <div class="section">
    <div class="section-title">📋 款式信息</div>
    <div class="form-row" style="margin-bottom:6px">
      <div class="field sm">
        <div class="type-switch">
          <span class="switch-label">款式类型</span>
          <div class="switch-toggle">
            <button class="active" data-type="solid">🎨 单色</button>
            <button data-type="print">🌸 印花</button>
          </div>
        </div>
      </div>
      <div class="field"><label>编号</label><input id="styleCode" value="" style="font-size:18px;font-weight:700"></div>
      <div class="field"><label>分类</label>
        <select id="styleCategory">
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="field xs"><label>工价</label><input class="num" id="laborCost" value=""></div>
      <div class="field xs"><label>烫扣</label><input class="num" id="ironCost" value=""></div>
      <div class="field"><label>包边</label><input id="edgeNote" placeholder="如: 本布包扣、滚边、蕾丝花边…"></div>
    </div>
    
  </div>

  <!-- Fabrics Section -->
  <div class="section">
    <div class="section-title">面料 <button class="add-action" onclick="addFabricRow()">+ 添加面料行</button></div>
    <div id="fabricsContainer">
    </div>
  </div>

  <!-- Accessories Section -->
  <div class="section">
    <div class="section-title">工艺 &amp; 辅料 <button class="add-action" onclick="addAccessoryRow()">+ 添加</button></div>
    <div id="accessoriesContainer">
    </div>
  </div>

  <!-- Processing Notes Section -->
  <div class="section">
    <div class="section-title">📝 加工备注</div>
    <div class="field">
      <textarea rows="3" id="processingNote" placeholder="例如：锁边用同色线、拉链配色、刺绣工艺要求…"></textarea>
    </div>
  </div>

  <!-- Cost Summary Section -->
  <div class="section">
    <div class="cost-bar"><span>综合成本</span><span class="total" id="totalCost">€0.00</span></div>
    <div class="cost-bar" style="border-top:none;padding-top:0">
      <span class="markup">建议批发价 = 成本 + <input id="markupRate" value="25" onchange="calculateCosts()">%</span>
      <span style="font-weight:700;font-size:16px;color:#c9a96e" id="suggestedPrice">€0.00</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-save" onclick="saveStyle()">💾 保存款式</button>
    <a href="dashboard.html" class="btn-cancel">取消</a>
  </div>
</div>

<!-- Full-Screen Photo Viewer -->


<!-- Success Message -->
<div class="success-message" id="successMessage">
  <div style="text-align:center;color:#c9a96e;font-weight:600;">
    ✅ 款式保存成功！<br>
    <small style="color:#888;font-weight:normal;">正在跳转到控制台...</small>
  </div>
</div>

<script>
// ====== Carousel（Swiper 无限循环滑动）======
var _photoList = [];     // actual images
var _mainPhotoIdx = 0;   // 主图索引

function renderCarousel() {
  var wrap = document.getElementById('carouselWrap');
  var track = document.getElementById('carouselTrack');
  var counter = document.getElementById('carouselCounter');
  var total = _photoList.length;

  if (!total) {
    track.innerHTML = '<div class="swiper-slide"><div style="padding:80px 0;color:#d5d0c9;font-size:14px">暂无图片</div></div>';
    counter.textContent = '0/0';
    return;
  }

  if (typeof Swiper === 'undefined') {
    if (!renderCarousel._retry) renderCarousel._retry = 0;
    renderCarousel._retry++;
    if (renderCarousel._retry < 20) { setTimeout(renderCarousel, 200); }
    return;
  }

  var html = '';
  for (var i = 0; i < total; i++) {
    var _u = _photoList[i];
    if (_u === null) {
      html += '<div class="swiper-slide" style="position:relative;align-items:center;justify-content:center"><div style="color:#d5d0c9;font-size:14px">上传中…</div></div>';
      continue;
    }
    html += '<div class="swiper-slide" style="position:relative">' +
      '<img src="' + _u + '" alt="" loading="lazy" />' +
      '<button class="del-btn" onclick="event.stopPropagation();deletePhoto(' + i + ')">✕</button>' +
      '<button class="main-star' + (i === _mainPhotoIdx ? ' active' : '') + '" onclick="event.stopPropagation();setMainPhoto(' + i + ')">' + (i === _mainPhotoIdx ? '★' : '☆') + '</button>' +
      '</div>';
  }
  track.innerHTML = html;

  if (wrap._swiper) { wrap._swiper.destroy(true, true); wrap._swiper = null; }

  wrap._swiper = new Swiper('#carouselSwiper', {
    loop: true,
    speed: 400,
    grabCursor: true,
    slidesPerView: 1,
    loopedSlides: Math.min(total, 4),
    pagination: {
      el: '#carouselDots',
      clickable: true,
    },
    navigation: {
      nextEl: '.swiper-button-next',
      prevEl: '.swiper-button-prev',
    },
    on: {
      init: function() { counter.textContent = '1/' + total; },
      slideChange: function() { counter.textContent = (this.realIndex + 1) + '/' + total; }
    }
  });
}

function setMainPhoto(idx) {
  _mainPhotoIdx = idx;
  renderCarousel();
}

function deletePhoto(index) {
  _photoList.splice(index, 1);
  if (_mainPhotoIdx >= _photoList.length) _mainPhotoIdx = Math.max(0, _photoList.length - 1);
  else if (index < _mainPhotoIdx) _mainPhotoIdx--;
  renderCarousel();
}

// ===== Photo Upload =====
function handlePhotoUpload(input) {
  var files = input.files;
  if (!files || files.length === 0) return;
  for (var i = 0; i < files.length; i++) {
    (function(file) {
      // 用固定下标占位，XHR 永远是最终写入者
      var idx = _photoList.length;
      _photoList.push(null);

      // 1. 低清预览（仅当 XHR 还没写入时才生效）
      compressPreview(file, function(previewUrl) {
        if (previewUrl && _photoList[idx] === null) {
          _photoList[idx] = previewUrl;
          renderCarousel();
          var _cw = document.getElementById('carouselWrap');
          if (_cw._swiper) _cw._swiper.slideToLoop(idx, 0);
        }
      });

      // 2. 上传原始文件到服务器 — 这是最终权威路径
      var fd = new FormData();
      fd.append('file', file);
      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload', true);
      xhr.withCredentials = true;
      xhr.onload = function() {
        if (xhr.status === 200) {
          try { var r = JSON.parse(xhr.responseText); if (r.ok && r.path) {
            _photoList[idx] = r.path;
            renderCarousel();
            return;
          }} catch(e) {}
        }
        // 上传失败：移除该项
        if (_photoList[idx] !== undefined) {
          _photoList.splice(idx, 1);
          if (_mainPhotoIdx >= _photoList.length) _mainPhotoIdx = Math.max(0, _photoList.length - 1);
          renderCarousel();
        }
      };
      xhr.onerror = function() {
        if (_photoList[idx] !== undefined) {
          _photoList.splice(idx, 1);
          if (_mainPhotoIdx >= _photoList.length) _mainPhotoIdx = Math.max(0, _photoList.length - 1);
          renderCarousel();
        }
      };
      xhr.send(fd);
    })(files[i]);
  }
  input.value = '';
}

// 压缩到 200KB 以内仅用于即时预览（不用于上传）
function compressPreview(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      // 预览图最大宽高 800px
      var maxDim = 800;
      if (w > maxDim || h > maxDim) {
        var ratio = Math.min(maxDim / w, maxDim / h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      var url = canvas.toDataURL('image/jpeg', 0.6);
      var sizeKB = Math.round(url.length * 3 / 4 / 1024);
      // 如果还是超过 500KB 就继续降质量
      if (sizeKB > 500) {
        url = canvas.toDataURL('image/jpeg', 0.3);
      }
      callback(url);
    };
    img.onerror = function() { callback(null); };
    img.src = e.target.result;
  };
  reader.onerror = function() { callback(null); };
  reader.readAsDataURL(file);
}

// ===== Settings Data =====
function loadSettingsData() {
  var rawFabrics = localStorage.getItem('luna_settings_fabrics');
  var fb = [];
  if (rawFabrics) { try { fb = JSON.parse(rawFabrics); } catch(e) {} }
  if (fb.length === 0) {
    fb = [
      {name: '素罗马', pricePerM: 12.00, composition: '涤纶95% 氨纶5%'},
      {name: '精纺羊毛', pricePerM: 28.00, composition: '羊毛100%'},
      {name: '乔其纱', pricePerM: 15.00, composition: '涤纶100%'},
      {name: '里布', pricePerM: 12.00, composition: ''},
      {name: '棉布', pricePerM: 18.00, composition: ''},
      {name: '真丝', pricePerM: 35.00, composition: ''},
      {name: '雪纺', pricePerM: 20.00, composition: ''}
    ];
  }
  window._fabricOptions = fb.map(function(f) { return {name: f.name, pricePerM: f.pricePerM}; });

  var rawAcc = localStorage.getItem('luna_settings_procacc');
  var acc = [];
  if (rawAcc) { try { acc = JSON.parse(rawAcc); } catch(e) {} }
  if (acc.length === 0) {
    acc = [
      {name: '裁剪', price: 8}, {name: '车缝', price: 25}, {name: '锁边', price: 6},
      {name: '纽扣', price: 3.5}, {name: '拉链', price: 2}, {name: '烫钻', price: 12},
      {name: '刺绣', price: 15}
    ];
  }
  window._accessoryOptions = acc.map(function(a) { return {name: a.name, pricePerUnit: a.price}; });

  var rawCat = localStorage.getItem('luna_settings_categories');
  var cats = [];
  if (rawCat) { try { cats = JSON.parse(rawCat); } catch(e) {} }
  if (cats.length === 0) {
    cats = [{name:'裙装'},{name:'连衣裙'},{name:'裤装'},{name:'西装外套'},{name:'衬衫'},{name:'大衣'},{name:'套装'}];
  }
  window._categoryOptions = cats.map(function(c) { return c.name; });
}
loadSettingsData();

function getFabricOptions() { return window._fabricOptions || []; }
function getAccessoryOptions() { return window._accessoryOptions || []; }
function getCategoryOptions() { return window._categoryOptions || []; }

// ===== Initialize =====
document.addEventListener('DOMContentLoaded', function() {
  var catOptions = getCategoryOptions();
  var catSel = document.getElementById('styleCategory');
  catSel.innerHTML = '';
  catOptions.forEach(function(c) {
    var opt = document.createElement('option');
    opt.textContent = c;
    catSel.appendChild(opt);
  });

  function getUrlParam(name) {
    var match = location.search.match(new RegExp('[?&]' + name + '=([^&]+)'));
    return match ? decodeURIComponent(match[1]) : null;
  }
  var editCode = getUrlParam('code');

  if (editCode) {
    document.getElementById('pageTitle').textContent = '✏️ 编辑款式';
    try {
      var stored = localStorage.getItem('luna_styles_data');
      if (stored) {
        var allStyles = JSON.parse(stored);
        var style = allStyles.find(function(s) { return s.code === editCode; });
        if (style) {
          document.getElementById('styleCode').value = style.code;
          document.getElementById('styleCode').readOnly = true;
          if (style.note) document.getElementById('styleNote').value = style.note;
          if (style.category) document.getElementById('styleCategory').value = style.category;

          document.querySelectorAll('.switch-toggle button').forEach(function(b) {
            b.classList.toggle('active', b.dataset.type === (style.type || 'solid'));
          });

          if (style.laborCost) document.getElementById('laborCost').value = style.laborCost;
          if (style.ironCost) document.getElementById('ironCost').value = style.ironCost;
          if (style.edgeNote) document.getElementById('edgeNote').value = style.edgeNote;
          if (style.processingNote) document.getElementById('processingNote').value = style.processingNote;
          if (style.markupRate) document.getElementById('markupRate').value = style.markupRate;

          // Fabrics
          if (style.fabrics && style.fabrics.length > 0) {
            fabrics = style.fabrics.map(function(f) { return {name: f.name, pricePerM: f.pricePerM, usage: f.usage}; });
            refreshFabricRows();
          } else { addFabricRow(); }

          // Accessories
          if (style.accessories && style.accessories.length > 0) {
            accessories = style.accessories.map(function(a) { return {name: a.name, pricePerUnit: a.pricePerUnit, qty: a.qty}; });
            refreshAccessoryRows();
          } else { addAccessoryRow(); }

          // Images
          if (style.images && style.images.length > 0) {
            _photoList = style.images.slice();
            _mainPhotoIdx = (style.mainPhoto !== undefined && style.mainPhoto < _photoList.length) ? Number(style.mainPhoto) : 0;
            renderCarousel();
          }
        }
      }
    } catch(e) {
      console.error('加载款式数据失败:', e);
      document.getElementById('styleCode').value = '';
      addFabricRow();
      addAccessoryRow();
    }
  } else {
    document.getElementById('styleCode').value = '';
    addFabricRow();
    addAccessoryRow();
  }

  // Type switch
  document.querySelectorAll('.switch-toggle button').forEach(function(b) {
    b.addEventListener('click', function() {
      this.parentElement.querySelectorAll('button').forEach(function(x) { x.classList.remove('active'); });
      this.classList.add('active');
    });
  });

  // Photo upload
  var photoInput = document.getElementById('photoInput');
  var cameraInput = document.getElementById('cameraInput');
  if (photoInput) photoInput.addEventListener('change', function() { handlePhotoUpload(this); });
  if (cameraInput) cameraInput.addEventListener('change', function() { handlePhotoUpload(this); });

  calculateCosts();

  // 所有输入框点击自动全选（点击清零）
  document.querySelectorAll('input, textarea').forEach(function(el) {
    el.addEventListener('focus', function() { this.select(); });
  });
});

// ===== Fabric rows =====
var fabrics = [];

// ===== Cost calculation =====
function calculateCosts() {
  var laborCost = parseFloat(document.getElementById('laborCost').value) || 0;
  var ironCost = parseFloat(document.getElementById('ironCost').value) || 0;
  var fabricCost = fabrics.reduce(function(sum, f) { return sum + (f.pricePerM * f.usage); }, 0);
  var accessoryCost = accessories.reduce(function(sum, a) { return sum + (a.pricePerUnit * a.qty); }, 0);
  var totalCost = fabricCost + accessoryCost + laborCost + ironCost;
  var markupRate = parseFloat(document.getElementById('markupRate').value) || 25;
  var suggestedPrice = totalCost * (1 + markupRate / 100);
  document.getElementById('totalCost').textContent = '€' + totalCost.toFixed(2);
  document.getElementById('suggestedPrice').textContent = '€' + suggestedPrice.toFixed(2);
}

// ===== Save =====
function saveStyle() {
  function $id(id) { return document.getElementById(id); }
  function val(id, def) { var el = $id(id); return el ? el.value : (def || ''); }
  function numVal(id, def) { var el = $id(id); return el ? (parseFloat(el.value) || 0) : (def || 0); }
  function textVal(id, def) { var el = $id(id); return el ? (el.textContent || '€0') : ('€' + (def || 0)); }

  var styleData = {
    code: val('styleCode'),
    category: val('styleCategory'),
    type: (function(){var b=document.querySelector('.switch-toggle button.active');return b?b.dataset.type:'solid';})(),
    fabrics: fabrics.filter(function(f){return f.name;}),
    accessories: accessories.filter(function(a){return a.name;}),
    laborCost: numVal('laborCost'),
    ironCost: numVal('ironCost'),
    edgeNote: val('edgeNote'),
    processingNote: val('processingNote'),
    images: _photoList.filter(function(x){return x !== null;}),
    mainPhoto: _mainPhotoIdx,
    totalCost: parseFloat(textVal('totalCost').replace('€','')) || 0,
    suggestedPrice: parseFloat(textVal('suggestedPrice').replace('€','')) || 0,
    createdAt: new Date().toISOString()
  };

  if (!styleData.code) { alert('⚠️ 请输入款式编号'); return; }
  
  // 检查编号唯一性（添加模式）
  var existingStyles = [];
  try {
    var stored = localStorage.getItem('luna_styles_data');
    if (stored) existingStyles = JSON.parse(stored);
  } catch(e) { existingStyles = []; }

  var isEditMode = location.search.indexOf('code=') >= 0;
  if (!isEditMode) {
    var dup = existingStyles.find(function(s){return s.code===styleData.code;});
    if (dup) { alert('⚠️ 款式编号 ' + styleData.code + ' 已存在，请使用其他编号'); return; }
  }

  // 检查至少选择一种面料并有米数
  var validFabrics = fabrics.filter(function(f){return f.name && f.usage > 0;});
  if (validFabrics.length === 0) { alert('⚠️ 请至少选择一种面料并填写米数'); return; }
  styleData.fabrics = validFabrics;

  if (isEditMode) {
    var found = false;
    for (var i = 0; i < existingStyles.length; i++) {
      if (existingStyles[i].code === styleData.code) {
        styleData.createdAt = existingStyles[i].createdAt || styleData.createdAt;
        existingStyles[i] = styleData;
        found = true;
        break;
      }
    }
    if (!found) existingStyles.push(styleData);
  } else {
    existingStyles.push(styleData);
  }

  try {
    localStorage.setItem('luna_styles_data', JSON.stringify(existingStyles));
  } catch (e) {
    if (styleData.images && styleData.images.length > 0) {
      styleData.images = [];
      existingStyles[existingStyles.length-1].images = [];
      try {
        localStorage.setItem('luna_styles_data', JSON.stringify(existingStyles));
      } catch (e2) { showSaveError(e2); return; }
    } else { showSaveError(e); return; }
  }

  // 保存后推送到服务器
  var serverOk = true;
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/styles', false);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.withCredentials = true;
    xhr.send(JSON.stringify(styleData));
    if (xhr.status >= 400) { serverOk = false; console.error('服务端保存失败:', xhr.status); }
  } catch(e) { serverOk = false; }
  // 同步设置数据
  try { if (typeof LUNA !== 'undefined' && LUNA.syncAllToServer) LUNA.syncAllToServer(); } catch(e) {}

  // 保存后从服务器重新加载，保证 localStorage 里的图片路径是 WebP
  try {
    var rxhr = new XMLHttpRequest();
    rxhr.open('GET', '/api/styles/' + encodeURIComponent(styleData.code), true);
    rxhr.withCredentials = true;
    rxhr.onload = function() {
      if (rxhr.status === 200) {
        try {
          var sv = JSON.parse(rxhr.responseText);
          if (sv && sv.images) {
            var st = localStorage.getItem('luna_styles_data');
            if (st) {
              var al = JSON.parse(st);
              for (var si = 0; si < al.length; si++) {
                if (al[si].code === styleData.code) { al[si].images = sv.images; break; }
              }
              localStorage.setItem('luna_styles_data', JSON.stringify(al));
            }
          }
        } catch(e) {}
      }
    };
    rxhr.send();
  } catch(e) {}

  var successEl = $id('successMessage');
  if (successEl) successEl.classList.add('show');
  setTimeout(function(){
    var hasLogin = localStorage.getItem('luna_user');
    window.location.href = hasLogin ? 'dashboard.html' : 'guest-styles.html';
  }, 2000);
}

function showSaveError(e) {
  var msg = '保存失败，请重试';
  if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
    msg = '存储空间已满，请清理浏览器数据后重试';
  } else if (e.name === 'SecurityError') {
    msg = '浏览器存储不可用，请检查隐私设置';
  } else if (e.message) {
    msg = '保存失败: ' + e.message.substring(0, 80);
  }
  alert(msg);
}

document.getElementById('laborCost').addEventListener('input', calculateCosts);
document.getElementById('ironCost').addEventListener('input', calculateCosts);
document.getElementById('markupRate').addEventListener('input', calculateCosts);
