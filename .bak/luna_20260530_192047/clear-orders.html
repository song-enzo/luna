<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Clear Data</title><script src="luna-data.js?v=10"></script>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;background:#f7f6f3">
<div style="text-align:center;padding:40px;background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.06)">
  <h1 style="font-size:24px;margin-bottom:20px">🗑 清除订单数据</h1>
  <button onclick="clearOrders()" style="padding:14px 40px;font-size:16px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer">一键清除订单</button>
  <p id="msg" style="margin-top:20px;font-size:14px;color:#888"></p>
</div>
<script>
function clearOrders() {
  LUNA.showConfirm('确定清除所有订单数据？', function() {
    localStorage.removeItem('luna_orders_data');
    var msg = document.getElementById('msg');
    msg.textContent = '✅ 订单数据已清除！当前订单数: ' + JSON.parse(localStorage.getItem('luna_orders_data') || '[]').length;
    msg.style.color = '#27ae60';
  });
}
</script>
</body>
</html>
