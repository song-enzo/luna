<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>修改密码 · LUNA ATELIER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#faf9f7;color:#1a1a1a}
.header{display:flex;align-items:center;padding:0 16px;height:54px;background:#fff;border-bottom:1px solid #e8e5e0;position:sticky;top:0;z-index:100}
.hamburger{font-size:22px;cursor:pointer;padding:4px 10px 4px 0;background:none;border:none;color:#666;font-family:inherit;line-height:1}
.hamburger:hover{color:#1a1a1a}
.header .logo{font-size:16px;font-weight:700;letter-spacing:1px;text-decoration:none;color:#1a1a1a;margin-right:auto}
.side-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
.side-overlay.active{display:block}
.side-menu{position:fixed;top:0;left:0;bottom:0;width:270px;background:#fff;z-index:201;transform:translateX(-100%);transition:transform .2s ease;box-shadow:2px 0 12px rgba(0,0,0,.1);overflow-y:auto}
.side-menu.open{transform:translateX(0)}
.side-menu .sm-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid #f0ede8}
.side-menu .sm-header .sm-logo{font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:700;letter-spacing:2px;color:#1a1a1a}
.side-menu .sm-header .sm-close{font-size:18px;cursor:pointer;color:#999;background:none;border:none;font-family:inherit}
.side-menu .sm-section{padding:8px 0;border-bottom:1px solid #f5f2ef}
.side-menu .sm-section-title{font-size:9px;font-weight:600;color:#b5a58a;letter-spacing:1px;padding:0 16px 6px;text-transform:uppercase}
.side-menu .sm-link{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:13px;color:#555;text-decoration:none;transition:all .1s}
.side-menu .sm-link:hover{background:#faf9f6;color:#1a1a1a}
.side-menu .sm-link.danger{color:#c44}
.side-menu .sm-link.danger:hover{background:#fef0f0;color:#c33}
.page{max-width:450px;margin:0 auto;padding:40px 20px}
.card{background:#fff;border:1px solid #e8e5e0;border-radius:12px;padding:32px 28px}
.card h2{font-size:18px;font-weight:700;margin-bottom:4px;color:#1a1a1a}
.card .sub{font-size:12px;color:#999;margin-bottom:24px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:11px;color:#888;font-weight:500;margin-bottom:4px}
.form-group input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;font-family:inherit;background:#faf9f7;transition:all .15s}
.form-group input:focus{border-color:#c9a96e;outline:none;background:#fff}
.form-group input::placeholder{color:#ccc}
.btn-save{width:100%;padding:12px;background:#c9a96e;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-save:hover{background:#b8963e}
.btn-save:disabled{opacity:.4;cursor:default}
.msg{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:18px;display:none}
.msg.error{display:block;background:#fef0f0;color:#c44;border:1px solid #fdd}
.msg.success{display:block;background:#eef5e8;color:#3a7a3a;border:1px solid #d0e5c0}
.user-info{font-size:13px;color:#666;background:#faf8f5;border-radius:6px;padding:10px 14px;margin-bottom:20px}
.user-info strong{color:#1a1a1a}
</style>
</head>
<body>
<div class="header">
  <button class="hamburger" onclick="toggleMenu()">☰</button>
  <span class="logo">🔑 修改密码</span>
</div>
<div class="side-overlay" id="sideOverlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
  <div class="sm-header">
    <span class="sm-logo">LUNA ATELIER</span>
    <button class="sm-close" onclick="toggleMenu()">✕</button>
  </div>
  <div class="sm-section">
    <div class="sm-section-title">款式</div>
    <a class="sm-link" href="guest-styles.html">👗 款式浏览</a>
    <a class="sm-link" href="add-style.html">➕ 添加款式</a>
  </div>
  <div class="sm-section">
    <div class="sm-section-title">订单</div>
    <a class="sm-link" href="my-orders.html">📋 我的订单</a>
    <a class="sm-link" href="orders.html">📋 订单管理</a>
  </div>
  <div class="sm-section">
    <div class="sm-section-title">管理</div>
    <a class="sm-link active" href="change-password.html">🔑 修改密码</a>
    <a class="sm-link" href="dashboard.html">🏠 工作台</a>
    <a class="sm-link danger" href="javascript:void(0)" onclick="logout()">🚪 退出账号</a>
  </div>
</div>
<div class="page">
  <div class="card">
    <h2>修改密码</h2>
    <p class="sub">定期更换密码可以提高账号安全性</p>
    <div class="user-info" id="userInfo">当前用户：<strong id="currentUser">-</strong></div>
    <div class="msg" id="msg"></div>
    <div class="form-group">
      <label>原密码</label>
      <input type="password" id="oldPw" placeholder="输入原密码" autocomplete="current-password">
    </div>
    <div class="form-group">
      <label>新密码（至少4位）</label>
      <input type="password" id="newPw" placeholder="输入新密码" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>确认新密码</label>
      <input type="password" id="confirmPw" placeholder="再次输入新密码" autocomplete="new-password">
    </div>
    <button class="btn-save" id="submitBtn" onclick="doChange()">确认修改</button>
  </div>
</div>
<script src="luna-data.js?v=15"></script>
<script>
function toggleMenu(){document.getElementById('sideMenu').classList.toggle('open');document.getElementById('sideOverlay').classList.toggle('active')}
function logout(){LUNA.clearUser();window.location.href='index.html'}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function msg(text,type){var el=document.getElementById('msg');el.textContent=text;el.className='msg '+type;el.style.display='block'}
function doChange(){
  var oldPw=document.getElementById('oldPw').value;
  var newPw=document.getElementById('newPw').value;
  var confirmPw=document.getElementById('confirmPw').value;
  if(!oldPw){msg('请输入原密码','error');return}
  if(!newPw||newPw.length<4){msg('新密码至少4位','error');return}
  if(newPw!==confirmPw){msg('两次输入的新密码不一致','error');return}
  var btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='提交中...';
  var xhr=new XMLHttpRequest();
  xhr.open('POST','/api/change-password',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.withCredentials=true;
  xhr.onload=function(){
    btn.disabled=false;btn.textContent='确认修改';
    try{
      var r=JSON.parse(xhr.responseText);
      if(r.ok){msg('✅ 密码修改成功！','success');document.getElementById('oldPw').value='';document.getElementById('newPw').value='';document.getElementById('confirmPw').value=''}
      else msg('❌ '+(r.error||'操作失败'),'error');
    }catch(e){msg('❌ 请求失败','error')}
  };
  xhr.onerror=function(){btn.disabled=false;btn.textContent='确认修改';msg('❌ 网络错误','error')};
  xhr.send(JSON.stringify({old_password:oldPw,new_password:newPw}));
}
// Init
(function(){
  var u=LUNA.getUser();
  if(!u){window.location.href='index.html';return}
  document.getElementById('currentUser').textContent=esc(u.name||u.username);
  // Hide admin-only links for non-admin
  if(u.role!=='admin'){
    var links=document.querySelectorAll('.sm-link[href="orders.html"],.sm-link[href="add-style.html"]');
    for(var i=0;i<links.length;i++)links[i].style.display='none';
  }
})();
</script>
</body>
</html>
